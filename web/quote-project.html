<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目型报价</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/auth-guard.js"></script>
  <style>
    /* 备注单元格 */
    td[data-field="notes"] {
      cursor: pointer;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    /* 服务类型下拉（表格内） */
    select.col-group-select {
      width: 100%;
      min-width: 90px;
      font-size: 13px;
    }
  </style>
</head>
<body style="visibility: hidden">
  <div class="page-shell">
    <header class="topbar">
      <a id="project-quote-back-link" class="topbar-link" href="/project-quotes.html">← 返回项目报价列表</a>
      <div class="topbar-actions">
        <button id="btn-toggle-view" class="ghost mini-button">切换客户视图</button>
        <a id="btn-terms" class="ghost mini-button" href="/terms-editor.html" style="text-decoration:none">商务条款</a>
        <button id="btn-delete" class="ghost mini-button hidden" data-confirm="确定删除此报价？此操作不可撤销。">删除报价</button>
      </div>
    </header>

    <div class="page-grid page-grid-wide">
      <!-- Main editor panel -->
      <section class="panel">
        <div class="panel-head">
          <h1 id="page-title">新建项目型报价</h1>
          <span id="page-subtitle">活动服务 / 旅游接待 / 综合服务</span>
        </div>
        <div id="pq-message" class="message-box hidden"></div>

        <!-- Project header form -->
        <form id="project-header-form" class="form-stack section-spacing-sm">
          <div class="inline-form">
            <label><span>项目名称</span><input name="name" placeholder="如：2024贝尔格莱德年会" required /></label>
            <label><span>客户名称</span><input name="client" placeholder="如：某某集团塞尔维亚分公司" /></label>
          </div>
          <div class="inline-form">
            <label><span>活动日期</span><input name="eventDate" type="date" /></label>
            <label><span>活动地点</span><input name="venue" placeholder="如：贝尔格莱德洲际酒店大宴会厅" /></label>
            <label><span>参会人数</span><input name="paxCount" type="number" min="0" step="1" placeholder="0" value="0" /></label>
            <label><span>报价币种</span>
              <select name="currency">
                <option value="EUR">EUR 欧元</option>
                <option value="RSD">RSD 第纳尔</option>
                <option value="RMB">RMB 人民币</option>
              </select>
            </label>
            <label><span>项目组分类</span>
              <select name="project_group" id="select-project-group">
                <!-- 由 JS 动态填充 -->
                <option value="mixed">综合服务</option>
              </select>
            </label>
            <label><span>状态</span>
              <select name="status">
                <option value="draft">草稿</option>
                <option value="sent">已发送</option>
                <option value="confirmed">已确认</option>
                <option value="cancelled">已取消</option>
              </select>
            </label>
          </div>
          <label><span>内部备注</span><textarea name="notes" rows="2" placeholder="活动特殊要求、注意事项等内部说明"></textarea></label>
        </form>

        <!-- Items section -->
        <div class="section-spacing-sm">
          <div class="list-row">
            <h2 class="section-title">报价明细</h2>
            <div class="action-row">
              <select id="template-select" class="mini-select">
                <option value="">— 选择模板套入 —</option>
                <option value="opening_ceremony">开幕仪式</option>
                <option value="large_conference">大型会议</option>
                <option value="product_launch">产品发布</option>
                <option value="exhibition_reception">展览接待</option>
              </select>
              <button id="btn-apply-template" class="mini-button">套用模板</button>
              <button id="btn-add-row" class="mini-button">+ 添加报价行</button>
            </div>
          </div>

          <div class="pq-table-wrap">
            <table class="pq-table" id="items-table">
              <thead>
                <tr>
                  <th class="col-group">服务类型</th>
                  <th class="col-name">中文名称</th>
                  <th class="col-name-en view-internal">英文名称</th>
                  <th class="col-unit">单位</th>
                  <th class="col-qty">数量</th>
                  <th class="col-price view-internal">成本单价</th>
                  <th class="col-price">销售单价</th>
                  <th class="col-subtotal view-internal">成本小计</th>
                  <th class="col-subtotal">销售小计</th>
                  <th class="col-margin view-internal">毛利率</th>
                  <th class="col-supplier view-internal">供应商</th>
                  <th class="col-notes">备注</th>
                  <th class="col-actions"></th>
                </tr>
              </thead>
              <tbody id="items-tbody">
                <tr class="empty-row">
                  <td colspan="13" class="empty">暂无报价行，点击「+ 添加报价行」开始，或选择模板套入</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Right sticky panel: summary + save -->
      <aside class="panel sticky-panel wide-preview-panel">
        <div class="panel-head">
          <h2>报价汇总</h2>
          <span id="view-label">内部视图</span>
        </div>

        <div class="pq-summary">
          <div class="metric"><span>报价行数</span><strong id="sum-count">0 条</strong></div>
          <div class="metric view-internal"><span>成本合计</span><strong id="sum-cost">—</strong></div>
          <div class="metric"><span>报价合计</span><strong id="sum-sell">—</strong></div>
          <div class="metric view-internal"><span>毛利额</span><strong id="sum-profit">—</strong></div>
          <div class="metric view-internal"><span>综合毛利率</span><strong id="sum-margin">—</strong></div>
        </div>

        <!-- 项目组分类标签（替代原分组明细） -->
        <div id="group-breakdown" class="pq-group-breakdown section-spacing-sm"></div>

        <div class="button-row section-spacing-sm">
          <button id="btn-save" type="button">保存报价</button>
          <a id="project-quote-cancel-link" class="ghost button-link" href="/project-quotes.html">取消</a>
        </div>
      </aside>
    </div>
  </div>

  <!-- 备注浮层由 quote-project.js 在页面加载时创建并 append 到 body -->

  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script src="/return-utils.js"></script>
  <script src="/quote-project.js"></script>
</body>
</html>
