<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报价单维护</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .initializing-project #mode-selector-panel,
    .initializing-project #preview-aside,
    .initializing-project .quote-items-section { display: none !important; }
    .initializing-project #standard-editor-grid { grid-template-columns: 1fr !important; }
  </style>
  <script>
    (function () {
      if (new URLSearchParams(location.search).get('mode') === 'project_based') {
        document.documentElement.classList.add('initializing-project');
      }
    })();
  </script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="topbar-link" href="/quotes.html">← 返回报价列表</a>
    </header>

    <div id="quote-message" class="message-box hidden" style="margin:0 0 0 0;border-radius:0"></div>

    <div id="mode-selector-panel" class="panel" style="margin-bottom:0;border-bottom-left-radius:0;border-bottom-right-radius:0">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-weight:600;color:var(--text-secondary,#666);font-size:13px">报价模式：</span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="pricingModeRadio" value="standard" checked id="mode-radio-standard" />
          标准差旅报价
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="pricingModeRadio" value="project_based" id="mode-radio-project" />
          项目型报价（活动 / 会议 / 展会）
        </label>
        <span style="flex:1"></span>
        <span id="quote-form-mode" class="status-text subtle-status">新建模式</span>
      </div>
    </div>

    <div class="page-grid quote-editor-grid" id="standard-editor-grid">
      <section class="panel form-main-panel" style="border-top-left-radius:0;border-top-right-radius:0">
        <div class="admin-page-head">
          <div>
            <p class="eyebrow">报价管理</p>
            <h1 id="quote-form-title" class="page-title-sm">新建报价单</h1>
            <p id="quote-form-subtitle" class="page-subtitle">用于录入客户信息、行程日期和报价项目，右侧会同步显示汇总结果。</p>
          </div>
        </div>
        <form id="quote-form" class="form-stack"></form>
      </section>

      <aside class="panel preview-side-panel preview-panel-static-safe" id="preview-aside">
        <div class="panel-head panel-head-wrap">
          <div>
            <h2>报价预览</h2>
            <p class="meta">按报价币种自动汇总，并显示原币种与折算结果。</p>
          </div>
        </div>
        <div id="quote-preview" class="stack"></div>
      </aside>
    </div>

    <div id="project-mode-wrapper" style="display:none">
      <section class="panel project-mode-panel" style="border-top-left-radius:0;border-top-right-radius:0">
        <div class="project-mode-intro">
          <div>
            <p class="section-kicker">项目型报价</p>
            <h2 class="project-mode-title">项目组与明细录入</h2>
          </div>
          <p class="project-mode-copy">按项目组拆分差旅接待、活动执行和综合服务，底部汇总区会自动形成报价结论。建议先命名项目组，再逐项补充明细。</p>
        </div>
        <div id="project-header-area"></div>
        <div id="project-base-info" style="display:none"></div>
        <div id="project-groups-editor"></div>
      </section>
    </div>
  </div>
  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script src="/quote-project-editor.js"></script>
  <script src="/quote-new.js"></script>
</body>
</html>
