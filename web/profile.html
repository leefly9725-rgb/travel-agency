<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#20010;&#20154;&#35774;&#32622; | LDS International Travel</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/auth-guard.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #142033;
      background: radial-gradient(circle at top right, rgba(198,162,89,0.14), transparent 24%),
                  radial-gradient(circle at top left, rgba(16,42,82,0.08), transparent 28%),
                  linear-gradient(180deg, #fbf7f1 0%, #f3ede3 100%);
    }
    .pf-shell {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 60px;
    }
    .pf-topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .pf-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #556174;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 12px;
      border-radius: 10px;
      border: 1px solid rgba(20,32,51,0.1);
      background: rgba(255,255,255,0.85);
      transition: background 0.15s, color 0.15s;
    }
    .pf-back:hover { background: rgba(255,255,255,1); color: #102346; }
    .pf-page-title {
      font-size: 20px;
      font-weight: 700;
      color: #102346;
    }
    .pf-card {
      max-width: 480px;
      background: rgba(255,252,247,0.96);
      border: 1px solid rgba(20,32,51,0.08);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(20,32,51,0.08);
      padding: 32px 30px 28px;
    }
    .pf-card-title {
      font-size: 16px;
      font-weight: 700;
      color: #102346;
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(20,32,51,0.08);
    }
    .pf-field {
      display: grid;
      gap: 6px;
      margin-bottom: 16px;
    }
    .pf-field label {
      font-size: 12px;
      font-weight: 700;
      color: #435168;
    }
    .pf-field input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1.5px solid rgba(20,32,51,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.9);
      color: #142033;
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .pf-field input:focus {
      border-color: rgba(16,35,70,0.28);
      box-shadow: 0 0 0 3px rgba(16,35,70,0.08);
    }
    .pf-alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
      display: none;
    }
    .pf-alert.visible { display: block; }
    .pf-alert.success {
      background: #f0faf2;
      border: 1px solid #b7dfc2;
      color: #2e6b3e;
    }
    .pf-alert.error {
      background: #fff4f1;
      border: 1px solid #f1c6be;
      color: #a14a39;
    }
    .pf-btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #0d1f3d, #1e4678);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.18s, transform 0.18s;
    }
    .pf-btn:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.92; }
    .pf-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body style="visibility:hidden">
  <div class="pf-shell">
    <div class="pf-topbar">
      <a href="/index.html" class="pf-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        首页
      </a>
      <h1 class="pf-page-title">个人设置</h1>
    </div>

    <div class="pf-card">
      <h2 class="pf-card-title">修改密码</h2>

      <div class="pf-field">
        <label for="cur-pw">当前密码</label>
        <input type="password" id="cur-pw" placeholder="请输入当前密码" autocomplete="current-password" />
      </div>
      <div class="pf-field">
        <label for="new-pw">新密码</label>
        <input type="password" id="new-pw" placeholder="至少8位，不能是纯数字" autocomplete="new-password" />
      </div>
      <div class="pf-field">
        <label for="confirm-pw">确认新密码</label>
        <input type="password" id="confirm-pw" placeholder="再次输入新密码" autocomplete="new-password" />
      </div>

      <div class="pf-alert" id="pf-alert"></div>

      <button class="pf-btn" id="pf-save-btn">保存修改</button>
    </div>
  </div>

  <script src="/app-utils.js"></script>
  <script>
    document.getElementById('pf-save-btn').addEventListener('click', async () => {
      const curPw = document.getElementById('cur-pw').value;
      const newPw = document.getElementById('new-pw').value;
      const confirmPw = document.getElementById('confirm-pw').value;
      const alertEl = document.getElementById('pf-alert');
      const btn = document.getElementById('pf-save-btn');

      alertEl.className = 'pf-alert';

      if (!curPw || !newPw || !confirmPw) {
        alertEl.textContent = '请填写所有密码字段。';
        alertEl.classList.add('visible', 'error');
        return;
      }
      if (newPw !== confirmPw) {
        alertEl.textContent = '两次输入的密码不一致。';
        alertEl.classList.add('visible', 'error');
        return;
      }
      if (newPw.length < 8 || /^\d+$/.test(newPw)) {
        alertEl.textContent = '新密码至少8位且不能是纯数字。';
        alertEl.classList.add('visible', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = '提交中...';
      try {
        await window.AppUtils.fetchJson('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: curPw, new_password: newPw }),
        }, '修改密码失败，请稍后重试');

        alertEl.textContent = '密码修改成功。';
        alertEl.classList.add('visible', 'success');
        document.getElementById('cur-pw').value = '';
        document.getElementById('new-pw').value = '';
        document.getElementById('confirm-pw').value = '';
        setTimeout(() => { alertEl.className = 'pf-alert'; }, 3000);
      } catch (e) {
        alertEl.textContent = e.message || '修改密码失败，请稍后重试。';
        alertEl.classList.add('visible', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存修改';
      }
    });
  </script>
</body>
</html>
