<!DOCTYPE html>
<html lang="zh-CN">
<head>

      <div class="admin-page-head">

        <span id="template-form-mode" class="status-text subtle-status">新建模式</span>
      </div>
      <div id="template-message" class="message-box hidden"></div>
      <form id="template-form" class="form-stack"></form>

  </div>
