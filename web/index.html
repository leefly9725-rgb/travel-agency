<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞扬国际旅行社运营系统 V1.0</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/auth-guard.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f4f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    /* ── Topbar ── */
    #fy-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px; background: #1B2A4A;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .fy-topbar-left { display: flex; align-items: center; gap: 10px; }
    .fy-logo-wrap {
      height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .fy-brand-wrap { display: flex; flex-direction: column; gap: 1px; }
    .fy-brand-name { color: #fff; font-size: 13px; font-weight: 500; line-height: 1.3; }
    .fy-brand-sub  { color: #C9A84C; font-size: 10px; line-height: 1.3; }
    .fy-topbar-right { display: flex; align-items: center; gap: 10px; }
    .fy-user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #C9A84C; color: #1B2A4A;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0; user-select: none;
    }
    .fy-user-info { display: flex; flex-direction: column; gap: 1px; }
    .fy-user-name { color: #fff; font-size: 12px; font-weight: 500; line-height: 1.3; }
    .fy-user-role { color: #C9A84C; font-size: 10px; line-height: 1.3; }
    .fy-divider   { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
    .fy-logout-btn {
      background: transparent; color: #fff; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      padding: 5px 11px; font-size: 12px; transition: border-color 0.2s;
    }
    .fy-logout-btn:hover { border-color: rgba(255,255,255,0.7); }

    /* ── Hero ── */
    #fy-hero {
      background: #1B2A4A; padding: 28px 24px;
      margin-top: 56px;
    }
    .fy-hero-eyebrow { color: #C9A84C; font-size: 11px; letter-spacing: 0.6px; margin-bottom: 6px; }
    .fy-hero-greeting { color: #fff; font-size: 20px; font-weight: 500; margin-bottom: 20px; min-height: 28px; }
    .fy-stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .fy-stat-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px; padding: 14px 16px;
    }
    .fy-stat-label { color: rgba(255,255,255,0.6); font-size: 11px; margin-bottom: 4px; }
    .fy-stat-icon  { font-size: 18px; margin-bottom: 4px; line-height: 1; }
    .fy-stat-value { color: #fff; font-size: 26px; font-weight: 700; line-height: 1; }
    .fy-stat-value.loading { font-size: 16px; opacity: 0.5; }

    /* ── Workspace ── */
    #fy-workspace {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }

    /* ── Panel card ── */
    .fy-panel {
      background: #fff;
      border: 0.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .fy-panel:last-child { margin-bottom: 0; }
    .fy-panel-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .fy-panel-title { font-size: 14px; font-weight: 600; color: #1B2A4A; }
    .fy-panel-link  { font-size: 12px; color: #1B2A4A; text-decoration: none; opacity: 0.6; }
    .fy-panel-link:hover { opacity: 1; text-decoration: underline; }
    .fy-soon-badge {
      background: #f3f4f6; color: #9ca3af;
      font-size: 10px; border-radius: 99px; padding: 2px 8px;
    }

    /* ── Quote rows ── */
    .fy-quote-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px;
    }
    .fy-quote-row:last-child { border-bottom: none; }
    .fy-q-name { font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .fy-q-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .fy-q-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
    .fy-q-amount { font-weight: 600; color: #1B2A4A; font-size: 13px; }
    .fy-q-date   { font-size: 11px; color: #bbb; margin-top: 2px; }
    .fy-empty    { font-size: 13px; color: #aaa; padding: 10px 0; }

    /* ── Dashboard action button ── */
    .fy-q-btn {
      flex-shrink: 0; margin-left: 10px;
      padding: 4px 10px; border-radius: 6px; border: 1px solid #1B2A4A;
      background: transparent; color: #1B2A4A; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.15s;
      text-decoration: none; display: inline-block;
    }
    .fy-q-btn:hover { background: #1B2A4A; color: #fff; }
    .fy-q-btn.gold { border-color: #C9A84C; color: #C9A84C; }
    .fy-q-btn.gold:hover { background: #C9A84C; color: #fff; }

    /* ── exec status badge (inline in dashboard) ── */
    .fy-exec-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px; white-space: nowrap; border: 1px solid;
    }
    .fy-exec-badge.e-preparing { background: rgba(2,119,189,0.08); border-color: rgba(2,119,189,0.2); color: #0277bd; }
    .fy-exec-badge.e-executing { background: rgba(123,31,162,0.08); border-color: rgba(123,31,162,0.2); color: #7b1fa2; }
    .fy-exec-badge.e-completed { background: rgba(36,97,59,0.08); border-color: rgba(36,97,59,0.2); color: #24613b; }

    /* ── Shortcuts (right panel) ── */
    .fy-section-label {
      font-size: 11px; color: #9ca3af; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }
    .fy-shortcut {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      background: #fff; border: 0.5px solid #e5e7eb; border-radius: 10px;
      margin-bottom: 8px; cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .fy-shortcut:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #d1d5db; }
    .fy-shortcut:last-child { margin-bottom: 0; }
    .fy-sc-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: #1B2A4A; display: flex; align-items: center; justify-content: center;
    }
    .fy-sc-icon.gold { background: #C9A84C; }
    .fy-sc-icon svg  { width: 15px; height: 15px; }
    .fy-sc-body { flex: 1; min-width: 0; }
    .fy-sc-label { font-size: 13px; font-weight: 500; color: #111; }
    .fy-sc-desc  { font-size: 11px; color: #888; margin-top: 2px; }
    .fy-sc-arrow { color: #ccc; font-size: 14px; flex-shrink: 0; }

    @media (max-width: 820px) {
      .fy-stat-grid  { grid-template-columns: repeat(2, 1fr); }
      #fy-workspace  { grid-template-columns: 1fr; }
      .fy-user-info, .fy-divider { display: none; }
    }
  </style>
</head>
<body style="visibility: hidden">

  <!-- ── Fixed Topbar ──────────────────────────────────────────── -->
  <nav id="fy-topbar">
    <div class="fy-topbar-left">
      <div class="fy-logo-wrap">
        <img src="/assets/logo.png" alt="飞扬" style="height: 32px; width: auto; display: block;">
      </div>
      <div class="fy-brand-wrap">
        <span class="fy-brand-name">飞扬国际旅行社</span>
        <span class="fy-brand-sub">FEIYANG TRIP · 运营系统 V1.0</span>
      </div>
    </div>
    <div class="fy-topbar-right">
      <div class="fy-user-avatar" id="fy-avatar">…</div>
      <div class="fy-user-info">
        <span class="fy-user-name" id="fy-uname">—</span>
        <span class="fy-user-role" id="fy-urole">—</span>
      </div>
      <div class="fy-divider"></div>
      <button class="fy-logout-btn" id="fy-logout">退出登录</button>
    </div>
  </nav>

  <!-- ── Hero ─────────────────────────────────────────────────── -->
  <section id="fy-hero">
    <p class="fy-hero-eyebrow">FEIYANG TRIP · 贝尔格莱德运营中心</p>
    <p class="fy-hero-greeting" id="fy-greeting">加载中…</p>
    <div class="fy-stat-grid">
      <div class="fy-stat-card">
        <div class="fy-stat-icon">📋</div>
        <div class="fy-stat-label">全部报价单</div>
        <div class="fy-stat-value loading" id="stat-total">…</div>
      </div>
      <div class="fy-stat-card">
        <div class="fy-stat-icon">⏳</div>
        <div class="fy-stat-label">待审批</div>
        <div class="fy-stat-value loading" id="stat-pending">…</div>
      </div>
      <div class="fy-stat-card">
        <div class="fy-stat-icon">🗓️</div>
        <div class="fy-stat-label">本月新增</div>
        <div class="fy-stat-value loading" id="stat-month">…</div>
      </div>
      <div class="fy-stat-card">
        <div class="fy-stat-icon">🚀</div>
        <div class="fy-stat-label">执行中项目</div>
        <div class="fy-stat-value loading" id="stat-executing">…</div>
      </div>
    </div>
  </section>

  <!-- ── Workspace ─────────────────────────────────────────────── -->
  <div id="fy-workspace">

    <!-- Left: dashboard panels -->
    <div id="fy-left">

      <!-- 待我审批（仅 manager/admin 可见，authReady 前隐藏） -->
      <div class="fy-panel" id="panel-approvals" style="display:none">
        <div class="fy-panel-head">
          <span class="fy-panel-title">⏳ 待我审批</span>
          <a class="fy-panel-link" href="/standard-quotes.html?filter=pending">查看全部 →</a>
        </div>
        <div id="approvals-list"><p class="fy-empty">加载中…</p></div>
      </div>

      <!-- 我的草稿 -->
      <div class="fy-panel">
        <div class="fy-panel-head">
          <span class="fy-panel-title">📝 我的草稿</span>
          <a class="fy-panel-link" href="/standard-quotes.html">查看全部 →</a>
        </div>
        <div id="drafts-list"><p class="fy-empty">加载中…</p></div>
      </div>

      <!-- 最近审批通过 -->
      <div class="fy-panel">
        <div class="fy-panel-head">
          <span class="fy-panel-title">✅ 最近审批通过</span>
          <a class="fy-panel-link" href="/standard-quotes.html">查看全部 →</a>
        </div>
        <div id="approved-list"><p class="fy-empty">加载中…</p></div>
      </div>

    </div>

    <!-- Right: quick shortcuts -->
    <div id="fy-right">
      <p class="fy-section-label">快捷入口</p>
      <div id="fy-shortcuts"><p class="fy-empty">加载中…</p></div>
    </div>

  </div>

  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script>
    'use strict';

    /* ── Constants ─────────────────────────────────────────────── */
    const ROLE_LABELS = {
      admin:                      '系统管理员',
      manager:                    '经理/主管',
      standard_quote_specialist:  '标准报价专员',
      project_quote_specialist:   '项目型报价专员',
    };

    const EXEC_LABEL = { preparing: '筹备中', executing: '执行中', completed: '已完成' };
    const EXEC_CLS   = { preparing: 'e-preparing', executing: 'e-executing', completed: 'e-completed' };

    const MODULES = [
      { key: 'standard-quotes',   label: '标准报价',   desc: '查看与管理标准报价',      href: '/standard-quotes.html',  perm: 'standard_quote.view', gold: false },
      { key: 'project-quotes',    label: '项目型报价', desc: '管理活动/会议/展会报价',   href: '/project-quotes.html',   perm: 'project_quote.view',  gold: false },
      { key: 'receptions',        label: '接待管理',   desc: '新建与跟踪接待任务',      href: '/receptions.html',        perm: 'reception.view',      gold: false },
      { key: 'documents',         label: '文档管理',   desc: '报价单、行程单等文档预览', href: '/documents.html',         perm: 'document.view',       gold: false },
      { key: 'suppliers',         label: '供应商管理', desc: '物料成本与价格库管理',     href: '/suppliers.html',         perm: 'supplier.view',       gold: false },
      { key: 'templates',         label: '模板管理',   desc: '维护常用报价项目模板',     href: '/templates.html',         perm: 'standard_quote.view', gold: false },
      { key: 'projects',          label: '项目主档',   desc: '项目概览与档案信息',       href: '/projects.html',          perm: 'project_quote.view',  gold: false },
      { key: 'admin-permissions', label: '权限管理',   desc: '用户、角色与权限配置',     href: '/admin-permissions.html', perm: 'user.view',           gold: true  },
    ];

    /* ── Helpers ───────────────────────────────────────────────── */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getGreeting(name) {
      const h = new Date().getHours();
      const g = h >= 6 && h < 12  ? '早上好'
              : h >= 12 && h < 14 ? '中午好'
              : h >= 14 && h < 18 ? '下午好'
              :                     '晚上好';
      return name ? `${g}，${name}` : g;
    }

    function parseRoles(rolesArr) {
      if (!Array.isArray(rolesArr)) return [];
      return rolesArr.map(r => (typeof r === 'string' ? r : (r.code || r.id || r.name || '')));
    }

    // "2024-03-21T08:30:00Z" → "03-21 08:30"
    function fmtDatetime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return '—';
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${mm}-${dd} ${hh}:${mi}`;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return String(iso).slice(0, 10) || '—';
    }

    /* ── KPI cards ─────────────────────────────────────────────── */
    function renderKpi(kpi) {
      const set = (id, val) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = val;
        el.classList.remove('loading');
      };
      set('stat-total',     kpi.total     ?? '—');
      set('stat-pending',   kpi.pending   ?? '—');
      set('stat-month',     kpi.monthNew  ?? '—');
      set('stat-executing', kpi.executing ?? '—');
    }

    /* ── 待我审批 ──────────────────────────────────────────────── */
    function renderApprovalList(list) {
      const el = document.getElementById('approvals-list');
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="fy-empty">暂无待审批报价单</p>';
        return;
      }
      el.innerHTML = list.map(q => `
        <div class="fy-quote-row">
          <div style="min-width:0;flex:1">
            <div class="fy-q-name" title="${esc(q.clientName)}">${esc(q.quoteNumber || q.clientName || '—')}</div>
            <div class="fy-q-meta">${esc(q.clientName)} · ${esc(q.destination || '—')}</div>
            <div class="fy-q-meta">提交：${fmtDatetime(q.date)}</div>
          </div>
          <a class="fy-q-btn gold" href="/quote-detail.html?id=${esc(q.id)}">去审批</a>
        </div>`).join('');
    }

    /* ── 我的草稿 ──────────────────────────────────────────────── */
    function renderDraftList(list) {
      const el = document.getElementById('drafts-list');
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="fy-empty">暂无草稿</p>';
        return;
      }
      el.innerHTML = list.map(q => `
        <div class="fy-quote-row">
          <div style="min-width:0;flex:1">
            <div class="fy-q-name" title="${esc(q.clientName)}">${esc(q.quoteNumber || q.clientName || '—')}</div>
            <div class="fy-q-meta">${esc(q.clientName)} · ${esc(q.destination || '—')}</div>
            <div class="fy-q-date">更新：${fmtDate(q.date)}</div>
          </div>
          <a class="fy-q-btn" href="/quote-detail.html?id=${esc(q.id)}">继续编辑</a>
        </div>`).join('');
    }

    /* ── 最近审批通过 ───────────────────────────────────────────── */
    function renderApprovedList(list) {
      const el = document.getElementById('approved-list');
      if (!list || list.length === 0) {
        el.innerHTML = '<p class="fy-empty">暂无已审批通过的报价单</p>';
        return;
      }
      el.innerHTML = list.map(q => {
        const ec = q.executionStatus || 'preparing';
        const badge = `<span class="fy-exec-badge ${esc(EXEC_CLS[ec] || 'e-preparing')}">${esc(EXEC_LABEL[ec] || ec)}</span>`;
        return `
          <div class="fy-quote-row">
            <div style="min-width:0;flex:1">
              <div class="fy-q-name" title="${esc(q.clientName)}">${esc(q.quoteNumber || q.clientName || '—')}</div>
              <div class="fy-q-meta">${esc(q.clientName)} · ${esc(q.destination || '—')} · ${badge}</div>
              <div class="fy-q-date">审批：${fmtDate(q.date)}</div>
            </div>
            <a class="fy-q-btn" href="/quote-detail.html?id=${esc(q.id)}">查看</a>
          </div>`;
      }).join('');
    }

    /* ── Shortcuts ─────────────────────────────────────────────── */
    function renderShortcuts() {
      const ICON_SVG = `<svg viewBox="0 0 16 16" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 1.5L1 7h2v6.5h4V10h2v3.5h4V7h2L8 1.5z"/>
      </svg>`;
      const ROLE_MODULES = {
        standard_quote_specialist: ['standard-quotes', 'receptions', 'documents', 'templates'],
        project_quote_specialist:  ['project-quotes', 'receptions', 'documents', 'projects'],
        manager:                   ['standard-quotes', 'project-quotes', 'suppliers', 'projects', 'templates'],
        admin:                     null,
      };
      const roles = parseRoles((window.__CURRENT_USER__ || {}).roles);
      const primaryRole = roles[0] || '';
      const allowed = ROLE_MODULES[primaryRole] || null;
      const html = MODULES
        .filter(m => window.can(m.perm))
        .filter(m => !allowed || allowed.includes(m.key))
        .map(m => `
          <div class="fy-shortcut" onclick="location.href='${m.href}'">
            <div class="fy-sc-icon${m.gold ? ' gold' : ''}">${ICON_SVG}</div>
            <div class="fy-sc-body">
              <div class="fy-sc-label">${m.label}</div>
              <div class="fy-sc-desc">${m.desc}</div>
            </div>
            <span class="fy-sc-arrow">→</span>
          </div>`).join('');
      document.getElementById('fy-shortcuts').innerHTML = html || '<p class="fy-empty">暂无可用模块</p>';
    }

    /* ── Logout ────────────────────────────────────────────────── */
    document.getElementById('fy-logout').addEventListener('click', function () {
      localStorage.removeItem('app_token');
      window.location.href = '/login.html';
    });

    /* ── Auth ready ────────────────────────────────────────────── */
    document.addEventListener('authReady', function () {
      const user  = window.__CURRENT_USER__ || {};
      const name  = user.display_name || user.name || '用户';
      const roles = parseRoles(user.roles);
      const primaryRole = roles[0] || '';

      document.getElementById('fy-avatar').textContent = name.charAt(0) || '?';
      document.getElementById('fy-uname').textContent  = name;
      document.getElementById('fy-urole').textContent  = ROLE_LABELS[primaryRole] || primaryRole || '—';
      document.getElementById('fy-greeting').textContent = getGreeting(name);

      renderShortcuts();

      // 展示"待我审批"面板（仅 manager/admin）
      const isManagerOrAdmin = roles.includes('admin') || roles.includes('manager');
      if (isManagerOrAdmin) {
        document.getElementById('panel-approvals').style.display = '';
      }
    });

    /* ── Data loading（各模块独立 loading，Promise.all 并行）──── */
    (async function loadData() {
      const safe = fn => fn().catch(err => { console.error('[dashboard]', err); return null; });

      const statsPromise = safe(() => window.AppUtils.fetchJson('/api/dashboard/stats', null, ''));

      // 等待 stats 一次返回所有数据（后端已并行查询）
      const stats = await statsPromise;

      if (stats) {
        renderKpi(stats.kpi || {});
        renderApprovalList(stats.pendingApprovals || []);
        renderDraftList(stats.myDrafts || []);
        renderApprovedList(stats.recentApproved || []);
      } else {
        // 接口失败时清空 loading 状态
        ['stat-total','stat-pending','stat-month','stat-executing'].forEach(id => {
          const el = document.getElementById(id);
          if (el) { el.textContent = '—'; el.classList.remove('loading'); }
        });
        ['approvals-list','drafts-list','approved-list'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = '<p class="fy-empty">数据加载失败，请刷新页面</p>';
        });
      }
    })();
  </script>
</body>
</html>
