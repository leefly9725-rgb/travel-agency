<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>供应商价格库</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="topbar-link" href="/">← 首页</a>
    </header>

    <div class="page-grid page-grid-wide">
      <section class="panel">
        <div class="panel-head">
          <h1>供应商价格库</h1>
          <span>大型活动物料成本数据库</span>
        </div>
        <div id="supplier-message" class="message-box hidden"></div>

        <!-- Supplier list -->
        <div class="section-spacing-sm">
          <div class="list-row">
            <h2 class="section-title">供应商</h2>
            <button class="mini-button" id="btn-new-supplier">+ 新建供应商</button>
          </div>
          <div id="supplier-list" class="stack"></div>
        </div>

        <!-- Items section -->
        <div class="section-spacing" id="items-section" style="display:none">
          <div class="list-row">
            <h2 class="section-title" id="items-section-title">物料列表</h2>
            <button class="mini-button" id="btn-new-item">+ 添加物料</button>
          </div>
          <div class="inline-form filter-form" id="item-filter-row">
            <label><span>类别</span><select id="category-filter"><option value="">全部类别</option></select></label>
            <label><span>搜索</span><input type="search" id="item-search" placeholder="搜索物料名称…" /></label>
          </div>
          <div id="item-list" class="stack section-spacing-sm"></div>
        </div>
      </section>

      <aside class="panel sticky-panel wide-preview-panel">
        <!-- Supplier form -->
        <div id="supplier-form-section">
          <div class="panel-head">
            <h2>供应商信息</h2>
            <span id="supplier-mode">新建</span>
          </div>
          <form id="supplier-form" class="form-stack">
            <input type="hidden" name="id" />
            <label><span>供应商名称</span><input name="name" placeholder="例如：Congress Rental l.t.d." required /></label>
            <label><span>联系人</span><input name="contact" placeholder="联系人姓名" /></label>
            <label><span>电话</span><input name="phone" placeholder="例如：+381 11 1234567" /></label>
            <label><span>邮箱</span><input name="email" type="email" placeholder="例如：info@example.com" /></label>
            <label><span>备注</span><textarea name="notes" rows="2" placeholder="供应商备注说明"></textarea></label>
            <label class="checkbox-label"><input type="checkbox" name="isActiveSupplier" checked /><span>启用（活跃供应商）</span></label>
            <div class="button-row">
              <button type="submit">保存供应商</button>
              <button type="button" class="ghost" id="btn-cancel-supplier">取消</button>
            </div>
          </form>
        </div>

        <!-- Item form -->
        <div id="item-form-section" style="display:none">
          <div class="panel-head">
            <h2>物料信息</h2>
            <span id="item-mode">新建物料</span>
          </div>
          <form id="item-form" class="form-stack">
            <input type="hidden" name="id" />
            <input type="hidden" name="supplierId" />
            <label><span>类别</span><select name="category" required></select></label>
            <label><span>中文名称</span><input name="nameZh" placeholder="例如：LED墙8x3m" required /></label>
            <label><span>英文名称</span><input name="nameEn" placeholder="例如：LED Wall 8x3m" /></label>
            <label><span>规格说明</span><input name="spec" placeholder="例如：含运输安装" /></label>
            <label><span>单位</span><input name="unit" placeholder="例如：套 / m² / 个 / 人" required /></label>
            <label><span>成本价（EUR）</span><input type="number" name="costPrice" min="0" step="0.01" placeholder="0.00" /></label>
            <label><span>备注</span><textarea name="notes" rows="2" placeholder="其他说明"></textarea></label>
            <label class="checkbox-label"><input type="checkbox" name="isActive" checked /><span>启用（纳入价格库）</span></label>
            <div class="button-row">
              <button type="submit">保存物料</button>
              <button type="button" class="ghost" id="btn-cancel-item">取消</button>
            </div>
          </form>
        </div>
      </aside>
    </div>
  </div>
  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script src="/suppliers.js"></script>
</body>
</html>
