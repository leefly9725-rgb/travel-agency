<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>错误</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #1a3a5c;
      --bg-page:     #f0f4f8;
      --bg-card:     #ffffff;
      --text:        #1e2430;
      --muted:       #5f6b7a;
      --border:      #d4dbe3;
      --shadow:      0 8px 32px rgba(26,58,92,0.12), 0 2px 8px rgba(26,58,92,0.06);
      --radius:      12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:  #0f1923;
        --bg-card:  #1a2535;
        --text:     #e8edf3;
        --muted:    #8a97a6;
        --border:   #2c3a4a;
        --shadow:   0 8px 32px rgba(0,0,0,0.4);
      }
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 20px 28px; }
    }

    /* ── Icon ─────────────────────────────────────────────────────── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap.blue   { background: rgba(26,58,92,0.08); color: var(--brand); }
    .icon-wrap.orange { background: rgba(194,106,46,0.10); color: #c26a2e; }
    .icon-wrap.red    { background: rgba(163,61,47,0.10); color: #a33d2f; }
    .icon-wrap.gray   { background: rgba(95,107,122,0.10); color: var(--muted); }

    @media (prefers-color-scheme: dark) {
      .icon-wrap.blue   { background: rgba(91,155,213,0.12); color: #5b9bd5; }
      .icon-wrap.orange { background: rgba(194,106,46,0.15); color: #e08840; }
      .icon-wrap.red    { background: rgba(240,128,112,0.15); color: #f08070; }
    }

    /* ── Text ─────────────────────────────────────────────────────── */
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: transparent;
      color: var(--brand);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(26,58,92,0.05); }

    @media (prefers-color-scheme: dark) {
      .btn-primary { background: #2a5a8c; }
      .btn-secondary { color: #5b9bd5; border-color: var(--border); }
      .btn-secondary:hover { background: rgba(91,155,213,0.08); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap" id="icon-wrap">
      <!-- filled by JS -->
    </div>
    <h1 id="error-title"></h1>
    <p class="desc" id="error-desc"></p>
    <div class="actions">
      <a class="btn btn-secondary" id="btn-relogin" href="/login.html">重新登录</a>
      <a class="btn btn-primary" href="/index.html">返回首页</a>
    </div>
  </div>

  <script>
    const REASONS = {
      not_initialized: {
        title: '系统尚未初始化',
        desc:  '请联系系统管理员完成初始化配置后再试。',
        icon:  'settings',
        color: 'blue',
        showRelogin: true,
      },
      no_permission: {
        title: '访问被拒绝',
        desc:  '您没有访问此页面的权限，请联系管理员。',
        icon:  'lock',
        color: 'red',
        showRelogin: false,
      },
      session_expired: {
        title: '登录已过期',
        desc:  '您的登录状态已过期，请重新登录。',
        icon:  'clock',
        color: 'orange',
        showRelogin: true,
      },
      not_found: {
        title: '页面不存在',
        desc:  '您访问的页面不存在或已被移除。',
        icon:  'search',
        color: 'gray',
        showRelogin: false,
      },
    };

    const ICONS = {
      settings: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>`,
      lock: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>`,
      clock: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>`,
      search: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>`,
      warning: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>`,
    };

    const reason = new URLSearchParams(window.location.search).get('reason') || '';
    const cfg = REASONS[reason] || {
      title: '发生了一个错误',
      desc:  '请稍后重试，或联系系统管理员。',
      icon:  'warning',
      color: 'gray',
      showRelogin: false,
    };

    document.title = cfg.title + ' — 泷鼎晟运营系统';
    document.getElementById('error-title').textContent = cfg.title;
    document.getElementById('error-desc').textContent  = cfg.desc;
    document.getElementById('icon-wrap').innerHTML     = ICONS[cfg.icon] || ICONS.warning;
    document.getElementById('icon-wrap').className     = `icon-wrap ${cfg.color}`;

    if (!cfg.showRelogin) {
      document.getElementById('btn-relogin').classList.add('hidden');
    }
  </script>
</body>
</html>
