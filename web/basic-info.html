<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基础数据管理</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/auth-guard.js"></script>
  <link rel="stylesheet" href="/app-shell.css" />
  <style>
    :root {
      --accent:      #c7a15a;
      --accent-dark: #b8924d;
      --ink:         #1a1a1a;
      --muted:       #666;
      --line:        #f0ede8;
      --panel:       #fff;
      --bg:          #fafafa;
      --error-bg:    #fff4f1; --error-text: #a14a39;
      --success-bg:  #f0faf2; --success-text: #2e6b3e;
    }

    /* ── Tab 导航栏 ── */
    .bi-tabbar {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #eee;
      margin-bottom: 24px;
    }
    .bi-tab {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      color: #999;
      text-decoration: none;
      background: transparent;
      border: none;
      position: relative;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .bi-tab:hover { color: #333; }
    .bi-tab.is-active { color: var(--accent); font-weight: 600; }
    .bi-tab.is-active::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    /* ── Tab 面板 ── */
    .bi-panel { display: none; }
    .bi-panel.is-active { display: block; }

    /* ── 面板顶栏 ── */
    .bi-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .bi-panel-title { font-size: 16px; font-weight: 700; color: var(--ink); margin: 0; }

    /* ── 说明条 ── */
    .bi-desc {
      font-size: 12px;
      color: #7a5c18;
      background: rgba(199,161,90,0.08);
      border: 1px solid rgba(199,161,90,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    /* ── 表格容器 ── */
    .bi-table-wrap {
      border: 1px solid #ede9e3;
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
    }
    .bi-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .bi-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      background: #f5f3ef;
      border-bottom: 1px solid #f0ede8;
      white-space: nowrap;
    }
    .bi-table td {
      padding: 0 14px;
      height: 52px;
      border-bottom: 1px solid #f0ede8;
      color: var(--ink);
      vertical-align: middle;
    }
    .bi-table tr:hover td { background: #faf9f7; }
    .bi-table tr:last-child td { border-bottom: none; }
    .bi-table .cell-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .bi-table .cell-sec  { font-size: 13px; color: #999; }

    /* ── 状态徽章（点式）── */
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-on  { color: #2e7d32; }
    .badge-on  .badge-dot { background: #2e7d32; }
    .badge-off { color: #999; }
    .badge-off .badge-dot { background: #ccc; }
    .badge-sys { background: #e3f2fd; color: #1565c0; padding: 1px 7px; border-radius: 999px; font-size: 11px; margin-left: 5px; }

    /* ── 行内小按钮 ── */
    .btn-sm {
      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 1px solid #d4a96a; background: transparent; color: #d4a96a;
      transition: background 0.12s;
    }
    .btn-sm:hover { background: rgba(212,169,106,0.1); }
    .btn-sm + .btn-sm { margin-left: 6px; }
    .btn-sm.primary { border-color: #52c41a; color: #52c41a; }
    .btn-sm.primary:hover { background: rgba(82,196,26,0.08); }
    .btn-sm.danger  { border-color: #e0e0e0; color: #888; }
    .btn-sm.danger:hover  { border-color: #ff4d4f; color: #ff4d4f; background: rgba(255,77,79,0.04); }

    /* ── 新增按钮（橙色填充）── */
    .btn-add {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px; border-radius: 8px;
      border: none; background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.12s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--accent-dark); }

    /* ── 空/加载 ── */
    .bi-loading, .bi-empty {
      padding: 32px 16px; text-align: center;
      color: #999; font-size: 13px;
    }

    /* ═══ Tab3：左右分栏 ═══ */
    .sc-split {
      display: flex;
      border: 1px solid #ede9e3; border-radius: 12px;
      overflow: hidden; background: var(--panel); min-height: 420px;
    }
    .sc-left {
      flex: 0 0 200px; min-width: 200px;
      border-right: 1px solid #f0ede8;
      display: flex; flex-direction: column;
    }
    .sc-left-head {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0ede8;
      font-size: 12px; font-weight: 600; color: #888;
    }
    .btn-add-cat-txt {
      background: none; border: none;
      color: var(--accent); font-size: 13px; font-weight: 600;
      cursor: pointer; padding: 2px 4px;
      transition: color 0.12s;
    }
    .btn-add-cat-txt:hover { color: var(--accent-dark); }
    .sc-cat-list { flex: 1; overflow-y: auto; }
    .sc-cat-item {
      display: flex; align-items: center;
      padding: 0 14px; height: 40px;
      font-size: 13px; cursor: pointer;
      border-bottom: 1px solid rgba(20,32,51,0.04);
      transition: background 0.12s; color: #333;
      position: relative;
    }
    .sc-cat-item:hover { background: rgba(20,32,51,0.03); }
    .sc-cat-item.is-selected { background: #fdf6ee; color: var(--accent); font-weight: 600; }
    .sc-cat-item.is-selected::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .sc-cat-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sc-cat-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0; }
    .sc-cat-item:hover .sc-cat-actions,
    .sc-cat-item.is-selected .sc-cat-actions { opacity: 1; }
    .ico-btn {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 5px;
      border: none; background: transparent; cursor: pointer;
      color: #999; transition: background 0.12s, color 0.12s;
    }
    .ico-btn:hover { background: rgba(20,32,51,0.08); color: #333; }
    .ico-btn.danger:hover { background: rgba(255,77,79,0.08); color: #ff4d4f; }
    .sc-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .sc-right-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 16px;
      border-bottom: 1px solid #f0ede8;
    }
    .sc-right-title { font-size: 14px; font-weight: 700; color: var(--ink); margin: 0; }
    .sc-right-body { flex: 1; overflow-y: auto; }

    /* ═══ Tab4：模板卡片 ═══ */
    .tpl-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .tpl-card {
      display: block; padding: 16px 18px;
      border: 1px solid #ede9e3; border-radius: 10px;
      background: #fff; text-decoration: none; color: var(--ink);
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .tpl-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #d4a96a; }
    .tpl-mode-badge {
      display: inline-block;
      background: #fdf6ee; color: #c87941;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px; margin-bottom: 8px;
    }
    .tpl-card-name {
      font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tpl-card-date { font-size: 12px; color: #aaa; }

    /* ═══ Modal ═══ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
    }
    .modal-overlay.hidden { display: none !important; }
    .modal-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
      padding: 24px 28px 22px; width: 440px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .modal-title {
      font-size: 16px; font-weight: 600; color: var(--ink);
      margin: 0 0 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0ede8;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-field > label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width: 100%; padding: 8px 10px; box-sizing: border-box;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; background: #fafafa; color: var(--ink);
      font-family: inherit; transition: border-color 0.15s;
    }
    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus { outline: none; border-color: var(--accent); }
    .modal-field textarea { resize: vertical; }
    .modal-hint { font-size: 11px; color: #999; margin-top: 3px; }
    .modal-checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .modal-btn-cancel {
      padding: 8px 18px; border-radius: 8px;
      border: 1px solid #e0e0e0; background: transparent;
      color: #666; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .modal-btn-cancel:hover { background: #f5f5f5; }
    .modal-btn-submit {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .modal-btn-submit:hover { background: var(--accent-dark); }
    .modal-btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-error {
      font-size: 12px; color: var(--error-text);
      background: var(--error-bg); border-radius: 6px;
      padding: 6px 10px; margin-top: 10px;
    }
    .modal-error.hidden { display: none !important; }

    /* ── Toast ── */
    .bi-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 3000; white-space: nowrap;
    }
    .bi-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bi-toast.t-success { background: var(--success-bg); color: var(--success-text); border: 1px solid #b7dfc2; }
    .bi-toast.t-error   { background: var(--error-bg);   color: var(--error-text);   border: 1px solid #f1c6be; }

    @media (max-width: 768px) {
      .sc-split { flex-direction: column; }
      .sc-left { flex: none; min-width: unset; border-right: none; border-bottom: 1px solid #f0ede8; }
      .sc-cat-actions { opacity: 1; }
    }
  </style>
</head>
<body style="visibility:hidden">
  <div class="page-shell">
    <header class="topbar"></header>

    <div style="padding-bottom:40px">

      <!-- ── Tab 导航 ── -->
      <div class="bi-tabbar">
        <a class="bi-tab" href="#group-types">项目组类型</a>
        <a class="bi-tab" href="#supplier-catalog">供应商价格库</a>
        <a class="bi-tab" href="#templates">报价模板</a>
      </div>

      <!-- ═══ Tab 1：项目组类型（左右分栏）═══ -->
      <div id="panel-group-types" class="bi-panel">
        <div class="sc-split">
          <!-- 左侧：项目组分类列表 -->
          <div class="sc-left">
            <div class="sc-left-head">
              <span>项目组分类</span>
            </div>
            <div class="sc-cat-list" id="gt-cat-list">
              <div class="bi-loading">加载中…</div>
            </div>
            <div style="padding:10px 14px;border-top:1px solid #f0ede8">
              <button class="btn-add-cat-txt" id="btn-add-gt" style="display:none">＋ 新增分类</button>
            </div>
          </div>
          <!-- 右侧：该分组下的服务类型 -->
          <div class="sc-right">
            <div class="sc-right-head">
              <h3 class="sc-right-title" id="gt-right-title">请选择左侧分类</h3>
              <button class="btn-add" id="btn-add-it" style="display:none">+ 新增服务类型</button>
            </div>
            <div class="sc-right-body">
              <table class="bi-table">
                <thead>
                  <tr>
                    <th style="width:50%">服务类型名称</th>
                    <th style="width:12%">排序</th>
                    <th style="width:15%">状态</th>
                    <th style="width:23%">操作</th>
                  </tr>
                </thead>
                <tbody id="tbody-it">
                  <tr><td colspan="4" class="bi-empty">← 选择左侧分类查看服务类型</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ Tab 3：供应商价格库 ═══ -->
      <div id="panel-supplier-catalog" class="bi-panel">
        <div class="sc-split">
          <div class="sc-left">
            <div class="sc-left-head">
              <span>分类</span>
              <button class="btn-add-cat-txt" id="btn-add-cat" style="display:none" title="新增分类">＋ 新增</button>
            </div>
            <div class="sc-cat-list" id="sc-cat-list">
              <div class="bi-loading">加载中…</div>
            </div>
          </div>
          <div class="sc-right">
            <div class="sc-right-head">
              <h3 class="sc-right-title" id="sc-right-title">请选择左侧分类</h3>
              <button class="btn-add" id="btn-add-sci" style="display:none">+ 新增</button>
            </div>
            <div class="sc-right-body">
              <table class="bi-table">
                <thead>
                  <tr>
                    <th style="width:28%">名称</th>
                    <th style="width:28%">规格</th>
                    <th style="width:8%">单位</th>
                    <th style="width:12%">参考成本</th>
                    <th style="width:10%">状态</th>
                    <th style="width:14%">操作</th>
                  </tr>
                </thead>
                <tbody id="tbody-sci">
                  <tr><td colspan="6" class="bi-empty">← 选择左侧分类查看条目</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ Tab 4：报价模板 ═══ -->
      <div id="panel-templates" class="bi-panel">
        <div class="bi-panel-head">
          <h2 class="bi-panel-title">报价模板</h2>
          <a class="btn-add" href="/template-edit.html?new=1">+ 新增</a>
        </div>
        <div id="tpl-grid" class="tpl-grid">
          <div class="bi-loading">加载中…</div>
        </div>
      </div>

    </div>
  </div>


  <!-- ═══ Modal：服务类型（属于某项目组分类）═══ -->
  <div id="modal-it" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 class="modal-title" id="modal-it-title">新增服务类型</h3>
      <div class="modal-field">
        <label>服务类型名称 <span style="color:var(--error-text)">*</span></label>
        <input id="it-name" placeholder="例如：舞台搭建" />
      </div>
      <div class="modal-field">
        <label>所属分组</label>
        <input id="it-group-label" readonly style="background:#f5f5f5;color:#888;cursor:not-allowed" />
      </div>
      <div class="modal-field">
        <label>排序序号</label>
        <input id="it-sort" type="number" value="10" min="0" step="1" />
      </div>
      <div id="modal-it-err" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-it-cancel">取消</button>
        <button class="modal-btn-submit" id="modal-it-submit">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ Modal 2：项目组类型 ═══ -->
  <div id="modal-gt" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 class="modal-title" id="modal-gt-title">新增项目组类型</h3>
      <div class="modal-field">
        <label>中文名称 <span style="color:var(--error-text)">*</span></label>
        <input id="gt-name" placeholder="例如：会议服务" />
      </div>
      <div class="modal-field">
        <label>排序序号</label>
        <input id="gt-sort" type="number" value="10" min="0" step="1" />
      </div>
      <div id="modal-gt-err" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-gt-cancel">取消</button>
        <button class="modal-btn-submit" id="modal-gt-submit">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ Modal 3：供应商分类 ═══ -->
  <div id="modal-cat" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 class="modal-title" id="modal-cat-title">新增分类</h3>
      <div class="modal-field">
        <label>中文名称 <span style="color:var(--error-text)">*</span></label>
        <input id="cat-name" placeholder="例如：灯光设备" />
      </div>
      <div class="modal-field">
        <label>排序序号</label>
        <input id="cat-sort" type="number" value="10" min="0" step="1" />
      </div>
      <div id="modal-cat-err" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-cat-cancel">取消</button>
        <button class="modal-btn-submit" id="modal-cat-submit">保存</button>
      </div>
    </div>
  </div>

  <!-- ═══ Modal 4：供应商条目 ═══ -->
  <div id="modal-sci" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 class="modal-title" id="modal-sci-title">新增条目</h3>
      <div class="modal-field">
        <label>中文名称 <span style="color:var(--error-text)">*</span></label>
        <input id="sci-name-zh" placeholder="例如：LED墙 8×3m" />
      </div>
      <div class="modal-field">
        <label>英文名称（选填）</label>
        <input id="sci-name-en" placeholder="例如：LED Wall 8x3m" />
      </div>
      <div class="modal-field">
        <label>规格说明</label>
        <input id="sci-spec" placeholder="例如：含运输安装" />
      </div>
      <div class="modal-field">
        <label>单位 <span style="color:var(--error-text)">*</span></label>
        <input id="sci-unit" placeholder="例如：套 / m² / 个 / 人" />
      </div>
      <div class="modal-field">
        <label>参考成本价（EUR）</label>
        <input id="sci-cost" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="modal-field">
        <label>所属供应商（选填）</label>
        <select id="sci-supplier">
          <option value="">— 不指定 —</option>
        </select>
      </div>
      <div class="modal-field">
        <label>备注</label>
        <textarea id="sci-notes" rows="2" placeholder="其他说明"></textarea>
      </div>
      <div class="modal-field">
        <label class="modal-checkbox-row">
          <input type="checkbox" id="sci-active" checked />
          启用（纳入价格库）
        </label>
      </div>
      <div id="modal-sci-err" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-sci-cancel">取消</button>
        <button class="modal-btn-submit" id="modal-sci-submit">保存</button>
      </div>
    </div>
  </div>

  <div id="bi-toast" class="bi-toast"></div>

  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script>
  (function () {
    'use strict';

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function toast(msg, type) {
      const el = document.getElementById('bi-toast');
      el.textContent = msg;
      el.className = 'bi-toast show t-' + (type || 'success');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = 'bi-toast'; }, 3000);
    }

    function can(code) {
      return typeof window.can === 'function' ? window.can(code) : false;
    }

    /**
     * 判断当前用户是否有项目组类型管理权限。
     * 策略：默认显示，只有明确识别为「报价专员」角色时才隐藏。
     * 优先用 window.can('*') 检测管理员；兜底用角色列表排除 quotation_specialist。
     */
    function canEditTypes() {
      // 已加载完成：admin 拥有 '*' 权限直接通过
      if (typeof window.can === 'function') {
        if (window.can('project_type.edit') || window.can('project_type.create')) return true;
      }
      // 兜底：只要不是报价专员角色，均默认有权限（含 auth 尚未就绪的阶段）
      const roles = (window.__CURRENT_USER__ && window.__CURRENT_USER__.roles) || [];
      return !roles.includes('quotation_specialist');
    }

    function setModalError(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg || '';
      el.classList.toggle('hidden', !msg);
    }

    function setSubmitting(btnId, yes) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = yes;
      btn.textContent = yes ? '提交中…' : '保存';
    }

    // ── Tab 路由 ──
    const TAB_KEYS = ['group-types', 'supplier-catalog', 'templates'];
    const loadedTabs = new Set();

    function getActiveTab() {
      const hash = location.hash.slice(1);
      return TAB_KEYS.includes(hash) ? hash : TAB_KEYS[0];
    }

    function activateTab(key) {
      document.querySelectorAll('.bi-tab').forEach(a => {
        a.classList.toggle('is-active', a.getAttribute('href') === '#' + key);
      });
      TAB_KEYS.forEach(k => {
        const p = document.getElementById('panel-' + k);
        if (p) p.classList.toggle('is-active', k === key);
      });
      if (!loadedTabs.has(key)) {
        loadedTabs.add(key);
        if (key === 'group-types')       loadGroupTypes();
        else if (key === 'supplier-catalog') loadCategories().then(loadSuppliers);
        else if (key === 'templates')        loadTemplates();
      }
    }

    window.addEventListener('hashchange', () => activateTab(getActiveTab()));


    // ════════ Tab 1：项目组类型（左右分栏）════════

    let groupTypes  = [];      // 左侧：项目组分类列表
    let itemTypes   = [];      // 右侧：当前选中分组的服务类型列表
    let selectedGt  = null;    // 当前选中的项目组分类对象
    let editingGtId = null;    // 正在编辑的项目组分类 id
    let editingItId = null;    // 正在编辑的服务类型 id

    // ── 左侧：项目组分类 ──

    /** 加载全部项目组分类，渲染左侧列表，默认选中第一项 */
    async function loadGroupTypes() {
      try {
        groupTypes = await window.AppUtils.fetchJson('/api/project-group-types', null, '加载项目组类型失败');
        renderGtList();
        if (groupTypes.length && !selectedGt) selectGroupType(groupTypes[0]);
      } catch (e) {
        document.getElementById('gt-cat-list').innerHTML =
          `<div style="padding:16px;color:#a14a39;font-size:13px">${esc(e.message)}</div>`;
      }
    }

    /** 渲染左侧项目组分类列表 */
    function renderGtList() {
      const canEdit  = canEditTypes();
      const container = document.getElementById('gt-cat-list');
      if (!groupTypes.length) {
        container.innerHTML = '<div class="bi-empty">暂无分类</div>';
        return;
      }
      container.innerHTML = groupTypes
        .slice().sort((a, b) => (a.sortOrder || a.sort_order || 0) - (b.sortOrder || b.sort_order || 0))
        .map(t => {
          const nameZh   = t.nameZh || t.name_zh || t.code;
          const selected = selectedGt && selectedGt.id === t.id;
          const editIcon = canEdit
            ? `<button class="ico-btn" data-gt-edit="${esc(t.id)}" title="编辑分类">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>` : '';
          return `<div class="sc-cat-item${selected ? ' is-selected' : ''}" data-gt-select="${esc(t.id)}">
            <span class="sc-cat-name">${esc(nameZh)}</span>
            <span class="sc-cat-actions">${editIcon}</span>
          </div>`;
        }).join('');
    }

    /** 选中一个项目组分类，加载其服务类型 */
    function selectGroupType(gt) {
      selectedGt = gt;
      const nameZh = gt.nameZh || gt.name_zh || gt.code;
      document.getElementById('gt-right-title').textContent = nameZh + ' 的服务类型';
      applyPermissions();
      renderGtList();
      loadItemTypes(gt.id);
    }

    document.getElementById('gt-cat-list').addEventListener('click', e => {
      // 编辑按钮
      const editId = e.target.closest('[data-gt-edit]')?.dataset.gtEdit;
      if (editId) {
        const t = groupTypes.find(x => x.id === editId);
        if (t) openGtModal(t);
        return;
      }
      // 选中行
      const selId = e.target.closest('[data-gt-select]')?.dataset.gtSelect;
      if (selId && !e.target.closest('button')) {
        const t = groupTypes.find(x => x.id === selId);
        if (t) selectGroupType(t);
      }
    });

    // ── 项目组分类弹窗 ──

    function openGtModal(type) {
      editingGtId = type ? type.id : null;
      document.getElementById('modal-gt-title').textContent = type ? '编辑项目组分类' : '新增项目组分类';
      document.getElementById('gt-name').value = type ? (type.nameZh || type.name_zh || '') : '';
      document.getElementById('gt-sort').value = type ? (type.sortOrder ?? type.sort_order ?? 10) : 10;
      setModalError('modal-gt-err', '');
      document.getElementById('modal-gt').classList.remove('hidden');
      document.getElementById('gt-name').focus();
    }

    document.getElementById('modal-gt-cancel').addEventListener('click', () => {
      document.getElementById('modal-gt').classList.add('hidden');
    });

    document.getElementById('modal-gt-submit').addEventListener('click', async () => {
      const nameZh = document.getElementById('gt-name').value.trim();
      if (!nameZh) { setModalError('modal-gt-err', '中文名称不能为空。'); return; }

      const code = editingGtId
        ? (groupTypes.find(x => x.id === editingGtId)?.code || '')
        : 'type_' + Date.now();

      setSubmitting('modal-gt-submit', true);
      try {
        const url    = editingGtId ? `/api/project-group-types/${encodeURIComponent(editingGtId)}` : '/api/project-group-types';
        const method = editingGtId ? 'PUT' : 'POST';
        await window.AppUtils.fetchJson(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, nameZh, sortOrder: Number(document.getElementById('gt-sort').value || 0) }),
        }, '保存失败');
        document.getElementById('modal-gt').classList.add('hidden');
        toast(editingGtId ? '分类已更新。' : '分类已创建。', 'success');
        const prevSelectedId = selectedGt?.id;
        await loadGroupTypes();
        // 保持原来的选中状态
        if (prevSelectedId) {
          const prev = groupTypes.find(x => x.id === prevSelectedId);
          if (prev) selectGroupType(prev);
        }
      } catch (e) {
        setModalError('modal-gt-err', e.message);
      } finally {
        setSubmitting('modal-gt-submit', false);
      }
    });

    document.getElementById('btn-add-gt').addEventListener('click', () => openGtModal(null));

    // ── 右侧：服务类型 ──

    /** 加载当前选中项目组的服务类型 */
    async function loadItemTypes(projectGroupId) {
      const tbody = document.getElementById('tbody-it');
      tbody.innerHTML = '<tr><td colspan="4" class="bi-loading">加载中…</td></tr>';
      try {
        itemTypes = await window.AppUtils.fetchJson(
          `/api/quote-item-types?project_group_id=${encodeURIComponent(projectGroupId)}`,
          null, '加载服务类型失败'
        );
        renderItemTypes();
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#a14a39;padding:16px">${esc(e.message)}</td></tr>`;
      }
    }

    /** 渲染右侧服务类型列表 */
    function renderItemTypes() {
      const canEdit = canEditTypes();
      const tbody = document.getElementById('tbody-it');
      if (!itemTypes.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="bi-empty">暂无服务类型，点击「+ 新增服务类型」添加。</td></tr>';
        return;
      }
      tbody.innerHTML = itemTypes
        .slice().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
        .map(t => {
          const statusBadge = t.isActive !== false
            ? '<span class="badge badge-on"><span class="badge-dot"></span>启用</span>'
            : '<span class="badge badge-off"><span class="badge-dot"></span>停用</span>';
          const editBtn   = canEdit ? `<button class="btn-sm" data-it-edit="${esc(t.id)}">编辑</button>` : '';
          const toggleBtn = canEdit
            ? (t.isActive !== false
                ? `<button class="btn-sm danger" data-it-toggle="${esc(t.id)}" data-it-active="false">停用</button>`
                : `<button class="btn-sm primary" data-it-toggle="${esc(t.id)}" data-it-active="true">启用</button>`)
            : '';
          return `<tr>
            <td class="cell-name">${esc(t.nameZh || '')}</td>
            <td class="cell-sec">${t.sortOrder ?? 0}</td>
            <td>${statusBadge}</td>
            <td>${editBtn}${toggleBtn}</td>
          </tr>`;
        }).join('');
    }

    // ── 服务类型弹窗 ──

    function openItModal(type) {
      editingItId = type ? type.id : null;
      document.getElementById('modal-it-title').textContent = type ? '编辑服务类型' : '新增服务类型';
      document.getElementById('it-name').value  = type ? (type.nameZh || '') : '';
      document.getElementById('it-group-label').value = selectedGt ? (selectedGt.nameZh || selectedGt.name_zh || '') : '';
      document.getElementById('it-sort').value  = type ? (type.sortOrder ?? 10) : 10;
      setModalError('modal-it-err', '');
      document.getElementById('modal-it').classList.remove('hidden');
      document.getElementById('it-name').focus();
    }

    document.getElementById('modal-it-cancel').addEventListener('click', () => {
      document.getElementById('modal-it').classList.add('hidden');
    });

    document.getElementById('modal-it-submit').addEventListener('click', async () => {
      if (!selectedGt) { setModalError('modal-it-err', '请先选择左侧分类。'); return; }
      const nameZh = document.getElementById('it-name').value.trim();
      if (!nameZh) { setModalError('modal-it-err', '服务类型名称不能为空。'); return; }

      const payload = {
        nameZh,
        project_group_id: selectedGt.id,
        sortOrder: Number(document.getElementById('it-sort').value || 0),
      };

      setSubmitting('modal-it-submit', true);
      try {
        const url    = editingItId ? `/api/quote-item-types/${encodeURIComponent(editingItId)}` : '/api/quote-item-types';
        const method = editingItId ? 'PUT' : 'POST';
        await window.AppUtils.fetchJson(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }, '保存失败');
        document.getElementById('modal-it').classList.add('hidden');
        toast(editingItId ? '服务类型已更新。' : '服务类型已创建。', 'success');
        await loadItemTypes(selectedGt.id);
      } catch (e) {
        setModalError('modal-it-err', e.message);
      } finally {
        setSubmitting('modal-it-submit', false);
      }
    });

    document.getElementById('btn-add-it').addEventListener('click', () => openItModal(null));

    document.getElementById('tbody-it').addEventListener('click', async e => {
      const editId = e.target.dataset.itEdit;
      if (editId) {
        const t = itemTypes.find(x => x.id === editId);
        if (t) openItModal(t);
        return;
      }
      const toggleId = e.target.dataset.itToggle;
      if (toggleId) {
        const newActive = e.target.dataset.itActive === 'true';
        e.target.disabled = true;
        try {
          await window.AppUtils.fetchJson(`/api/quote-item-types/${encodeURIComponent(toggleId)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isActive: newActive }),
          }, '操作失败');
          toast(newActive ? '已启用。' : '已停用。', 'success');
          if (selectedGt) await loadItemTypes(selectedGt.id);
        } catch (e2) {
          toast(e2.message, 'error');
          e.target.disabled = false;
        }
      }
    });


    // ════════ Tab 3：供应商价格库 ════════

    let categories  = [];
    let selectedCat = null;
    let catItems    = [];
    let suppliers   = [];
    let editingCatId = null;
    let editingScId  = null;

    async function loadCategories() {
      try {
        categories = await window.AppUtils.fetchJson('/api/supplier-categories', null, '加载分类失败');
        renderCategories();
        if (categories.length && !selectedCat) selectCategory(categories[0]);
      } catch (e) {
        document.getElementById('sc-cat-list').innerHTML =
          `<div style="padding:16px;color:#a14a39;font-size:13px">${esc(e.message)}</div>`;
      }
    }

    async function loadSuppliers() {
      try {
        const list = await window.AppUtils.fetchJson('/api/suppliers', null, '加载供应商失败');
        suppliers = Array.isArray(list) ? list : (list.suppliers || []);
        const sel = document.getElementById('sci-supplier');
        suppliers.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name || s.nameEn || s.id;
          sel.appendChild(opt);
        });
      } catch (_) { /* 不阻塞 */ }
    }

    function renderCategories() {
      const canEdit = can('supplier_catalog.edit');
      const container = document.getElementById('sc-cat-list');
      if (!categories.length) {
        container.innerHTML = '<div class="bi-empty">暂无分类</div>';
        return;
      }
      container.innerHTML = categories
        .slice().sort((a, b) => (a.sortOrder || a.sort_order || 0) - (b.sortOrder || b.sort_order || 0))
        .map(c => {
          const nameZh   = c.nameZh || c.name_zh || c.code;
          const selected = selectedCat && selectedCat.id === c.id;
          const editIcon = canEdit
            ? `<button class="ico-btn" data-cat-edit="${esc(c.id)}" title="编辑分类">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>` : '';
          const stopIcon = canEdit
            ? `<button class="ico-btn danger" data-cat-stop="${esc(c.id)}" title="停用分类">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>` : '';
          return `<div class="sc-cat-item${selected ? ' is-selected' : ''}" data-cat-select="${esc(c.id)}">
            <span class="sc-cat-name">${esc(nameZh)}</span>
            <span class="sc-cat-actions">${editIcon}${stopIcon}</span>
          </div>`;
        }).join('');
    }

    function selectCategory(cat) {
      selectedCat = cat;
      document.getElementById('sc-right-title').textContent = cat.nameZh || cat.name_zh || cat.code;
      renderCategories();
      loadCatItems(cat.code);
    }

    async function loadCatItems(categoryCode) {
      const tbody = document.getElementById('tbody-sci');
      tbody.innerHTML = '<tr><td colspan="6" class="bi-loading">加载中…</td></tr>';
      try {
        const items = await window.AppUtils.fetchJson(
          `/api/supplier-items?category=${encodeURIComponent(categoryCode)}`,
          null, '加载条目失败'
        );
        catItems = Array.isArray(items) ? items : (items.items || []);
        renderCatItems();
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:#a14a39;padding:16px">${esc(e.message)}</td></tr>`;
      }
    }

    function renderCatItems() {
      const canEdit = can('supplier_catalog.edit');
      const tbody = document.getElementById('tbody-sci');
      if (!catItems.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="bi-empty">该分类暂无条目。</td></tr>';
        return;
      }
      tbody.innerHTML = catItems.map(item => {
        const nameZh   = item.nameZh || item.name_zh || '';
        const isActive = item.isActive !== false && item.is_active !== false;
        const statusBadge = isActive
          ? '<span class="badge badge-on"><span class="badge-dot"></span>启用</span>'
          : '<span class="badge badge-off"><span class="badge-dot"></span>停用</span>';
        const editBtn   = canEdit ? `<button class="btn-sm" data-sci-edit="${esc(item.id)}">编辑</button>` : '';
        const toggleBtn = canEdit
          ? (isActive
              ? `<button class="btn-sm danger" data-sci-stop="${esc(item.id)}">停用</button>`
              : `<button class="btn-sm primary" data-sci-start="${esc(item.id)}">启用</button>`)
          : '';
        const cost = item.costPrice ?? item.cost_price;
        return `<tr>
          <td class="cell-name">${esc(nameZh)}</td>
          <td class="cell-sec">${esc(item.spec || '—')}</td>
          <td class="cell-sec">${esc(item.unit || '—')}</td>
          <td class="cell-sec">${cost != null ? Number(cost).toFixed(2) : '—'}</td>
          <td>${statusBadge}</td>
          <td>${editBtn}${toggleBtn}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('sc-cat-list').addEventListener('click', async e => {
      const editId = e.target.closest('[data-cat-edit]')?.dataset.catEdit;
      if (editId) {
        const c = categories.find(x => x.id === editId);
        if (c) openCatModal(c);
        return;
      }
      const stopId = e.target.closest('[data-cat-stop]')?.dataset.catStop;
      if (stopId) {
        if (!confirm('确定停用该分类吗？')) return;
        try {
          await window.AppUtils.fetchJson(`/api/supplier-categories/${encodeURIComponent(stopId)}`,
            { method: 'DELETE' }, '停用失败');
          toast('分类已停用。', 'success');
          if (selectedCat && selectedCat.id === stopId) {
            selectedCat = null;
            document.getElementById('sc-right-title').textContent = '请选择左侧分类';
            document.getElementById('tbody-sci').innerHTML =
              '<tr><td colspan="6" class="bi-empty">← 选择左侧分类查看条目</td></tr>';
          }
          await loadCategories();
        } catch (e2) {
          toast(e2.message, 'error');
        }
        return;
      }
      const selId = e.target.closest('[data-cat-select]')?.dataset.catSelect;
      if (selId && !e.target.closest('button')) {
        const c = categories.find(x => x.id === selId);
        if (c) selectCategory(c);
      }
    });

    document.getElementById('tbody-sci').addEventListener('click', async e => {
      const editId = e.target.dataset.sciEdit;
      if (editId) {
        const item = catItems.find(x => x.id === editId);
        if (item) openSciModal(item);
        return;
      }
      const stopId = e.target.dataset.sciStop;
      if (stopId) {
        if (!confirm('确定停用该条目吗？')) return;
        e.target.disabled = true;
        try {
          await window.AppUtils.fetchJson(`/api/supplier-items/${encodeURIComponent(stopId)}`,
            { method: 'DELETE' }, '停用失败');
          toast('条目已停用。', 'success');
          if (selectedCat) await loadCatItems(selectedCat.code);
        } catch (e2) {
          toast(e2.message, 'error');
          e.target.disabled = false;
        }
        return;
      }
      const startId = e.target.dataset.sciStart;
      if (startId) {
        const item = catItems.find(x => x.id === startId);
        if (!item) return;
        e.target.disabled = true;
        try {
          await window.AppUtils.fetchJson(`/api/supplier-items/${encodeURIComponent(startId)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...item, isActive: true }),
          }, '启用失败');
          toast('条目已启用。', 'success');
          if (selectedCat) await loadCatItems(selectedCat.code);
        } catch (e2) {
          toast(e2.message, 'error');
          e.target.disabled = false;
        }
      }
    });

    document.getElementById('btn-add-cat').addEventListener('click', () => openCatModal(null));
    document.getElementById('btn-add-sci').addEventListener('click', () => openSciModal(null));

    // ── Modal 3：供应商分类 ──

    function openCatModal(cat) {
      editingCatId = cat ? cat.id : null;
      document.getElementById('modal-cat-title').textContent = cat ? '编辑分类' : '新增分类';
      document.getElementById('cat-name').value = cat ? (cat.nameZh || cat.name_zh || '') : '';
      document.getElementById('cat-sort').value = cat ? (cat.sortOrder ?? cat.sort_order ?? 10) : 10;
      setModalError('modal-cat-err', '');
      document.getElementById('modal-cat').classList.remove('hidden');
      document.getElementById('cat-name').focus();
    }

    document.getElementById('modal-cat-cancel').addEventListener('click', () => {
      document.getElementById('modal-cat').classList.add('hidden');
    });

    document.getElementById('modal-cat-submit').addEventListener('click', async () => {
      const nameZh = document.getElementById('cat-name').value.trim();
      if (!nameZh) { setModalError('modal-cat-err', '中文名称不能为空。'); return; }

      const code = editingCatId
        ? (categories.find(x => x.id === editingCatId)?.code || '')
        : 'cat_' + Date.now();

      setSubmitting('modal-cat-submit', true);
      try {
        const url    = editingCatId ? `/api/supplier-categories/${encodeURIComponent(editingCatId)}` : '/api/supplier-categories';
        const method = editingCatId ? 'PUT' : 'POST';
        await window.AppUtils.fetchJson(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, nameZh, sortOrder: Number(document.getElementById('cat-sort').value || 0) }),
        }, '保存失败');
        document.getElementById('modal-cat').classList.add('hidden');
        toast(editingCatId ? '分类已更新。' : '分类已创建。', 'success');
        await loadCategories();
      } catch (e) {
        setModalError('modal-cat-err', e.message);
      } finally {
        setSubmitting('modal-cat-submit', false);
      }
    });

    // ── Modal 4：供应商条目 ──

    function openSciModal(item) {
      editingScId = item ? item.id : null;
      document.getElementById('modal-sci-title').textContent = item ? '编辑条目' : '新增条目';
      document.getElementById('sci-name-zh').value  = item ? (item.nameZh || item.name_zh || '') : '';
      document.getElementById('sci-name-en').value  = item ? (item.nameEn || item.name_en || '') : '';
      document.getElementById('sci-spec').value     = item ? (item.spec || '') : '';
      document.getElementById('sci-unit').value     = item ? (item.unit || '') : '';
      document.getElementById('sci-cost').value     = item ? (item.costPrice ?? item.cost_price ?? '') : '';
      document.getElementById('sci-notes').value    = item ? (item.notes || '') : '';
      document.getElementById('sci-active').checked = item ? (item.isActive !== false && item.is_active !== false) : true;
      document.getElementById('sci-supplier').value = item ? (item.supplierId || item.supplier_id || '') : '';
      setModalError('modal-sci-err', '');
      document.getElementById('modal-sci').classList.remove('hidden');
      document.getElementById('sci-name-zh').focus();
    }

    document.getElementById('modal-sci-cancel').addEventListener('click', () => {
      document.getElementById('modal-sci').classList.add('hidden');
    });

    document.getElementById('modal-sci-submit').addEventListener('click', async () => {
      if (!selectedCat) { setModalError('modal-sci-err', '请先选择左侧分类。'); return; }
      const nameZh = document.getElementById('sci-name-zh').value.trim();
      const unit   = document.getElementById('sci-unit').value.trim();
      if (!nameZh) { setModalError('modal-sci-err', '中文名称不能为空。'); return; }
      if (!unit)   { setModalError('modal-sci-err', '单位不能为空。'); return; }

      const payload = {
        nameZh,
        nameEn:     document.getElementById('sci-name-en').value.trim(),
        spec:       document.getElementById('sci-spec').value.trim(),
        unit,
        costPrice:  Number(document.getElementById('sci-cost').value || 0),
        supplierId: document.getElementById('sci-supplier').value || null,
        notes:      document.getElementById('sci-notes').value.trim(),
        isActive:   document.getElementById('sci-active').checked,
        category:   selectedCat.code,
      };

      setSubmitting('modal-sci-submit', true);
      try {
        const url    = editingScId ? `/api/supplier-items/${encodeURIComponent(editingScId)}` : '/api/supplier-items';
        const method = editingScId ? 'PUT' : 'POST';
        await window.AppUtils.fetchJson(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        }, '保存失败');
        document.getElementById('modal-sci').classList.add('hidden');
        toast(editingScId ? '条目已更新。' : '条目已创建。', 'success');
        await loadCatItems(selectedCat.code);
      } catch (e) {
        setModalError('modal-sci-err', e.message);
      } finally {
        setSubmitting('modal-sci-submit', false);
      }
    });


    // ════════ Tab 4：报价模板 ════════

    const PRICING_MODE_LABELS = {
      standard:      '标准差旅报价',
      project_based: '项目型报价',
    };

    async function loadTemplates() {
      if (!can('standard_quote.view')) {
        document.getElementById('tpl-grid').innerHTML = '<div class="bi-empty">您没有查看报价模板的权限。</div>';
        return;
      }
      try {
        const data = await window.AppUtils.fetchJson('/api/templates', null, '加载模板失败');
        renderTemplates(Array.isArray(data) ? data : (data.templates || []));
      } catch (e) {
        document.getElementById('tpl-grid').innerHTML =
          `<div style="color:#a14a39;font-size:13px">${esc(e.message)}</div>`;
      }
    }

    function renderTemplates(list) {
      const grid = document.getElementById('tpl-grid');
      if (!list.length) {
        grid.innerHTML = '<div class="bi-empty">暂无模板，点击「新增」开始创建。</div>';
        return;
      }
      grid.innerHTML = list.map(t => {
        const mode    = PRICING_MODE_LABELS[t.pricingMode] || t.pricingMode || '—';
        const created = t.createdAt ? t.createdAt.slice(0, 10) : '';
        return `<a class="tpl-card" href="/template-edit.html?id=${encodeURIComponent(t.id)}">
          <div class="tpl-mode-badge">${esc(mode)}</div>
          <div class="tpl-card-name" title="${esc(t.name)}">${esc(t.name)}</div>
          ${created ? `<div class="tpl-card-date">${esc(created)}</div>` : ''}
        </a>`;
      }).join('');
    }


    // ════════ 权限 & 初始化 ════════

    function applyPermissions() {
      const canType    = canEditTypes();
      const canCatalog = can('supplier_catalog.edit') || can('supplier_catalog.create');
      document.getElementById('btn-add-it').style.display  = (canType && selectedGt) ? '' : 'none';
      document.getElementById('btn-add-gt').style.display  = canType    ? '' : 'none';
      document.getElementById('btn-add-cat').style.display = canCatalog ? '' : 'none';
      document.getElementById('btn-add-sci').style.display = canCatalog ? '' : 'none';
    }

    ['modal-it', 'modal-gt', 'modal-cat', 'modal-sci'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      ['modal-it', 'modal-gt', 'modal-cat', 'modal-sci'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
    });

    function init() {
      applyPermissions();
      activateTab(getActiveTab());
    }

    document.addEventListener('authReady', () => {
      applyPermissions();
      if (loadedTabs.has('group-types'))      { renderGtList(); renderItemTypes(); }
      if (loadedTabs.has('supplier-catalog')) renderCategories();
    });

    if (document.readyState !== 'loading') {
      init();
    } else {
      document.addEventListener('DOMContentLoaded', init);
    }

  })();
  </script>
  <script src="/app-shell.js"></script>
</body>
</html>
