<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标准报价</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/auth-guard.js"></script>
  <link rel="stylesheet" href="/app-shell.css" />
</head>
<body style="visibility: hidden">
  <div class="page-shell quote-list-shell">
    <header class="topbar quote-list-topbar">
      <a class="topbar-link" href="/">← 首页</a>
      <div class="topbar-actions">
        <a class="button-link" href="/quote-new.html">新建标准报价</a>
      </div>
    </header>

    <section class="panel quote-list-section">
      <div class="panel-head list-section-head">
        <div>
          <p class="section-kicker">标准报价</p>
          <div class="list-title-row">
            <h1>标准报价列表</h1>
            <span id="standard-quote-count" class="count-pill">0 条</span>
          </div>
          <span class="list-section-subtitle">用于日常差旅接待、商务考察和常规报价管理。</span>
        </div>
        <div class="list-toolbar">
          <label class="sort-toolbar" for="quote-search-input">
            <span>搜索</span>
            <input id="quote-search-input" type="search" placeholder="报价编号 / 客户 / 项目名…" style="width:200px;padding:6px 10px;border:1.5px solid var(--line);border-radius:8px;font:inherit;font-size:13px;background:var(--bg);color:var(--ink)" />
          </label>
          <label class="sort-toolbar" for="quote-sort-select">
            <span>排序方式</span>
            <select id="quote-sort-select">
              <option value="updated_at">最近更新</option>
              <option value="created_at">最新创建</option>
              <option value="quoteNumber">报价编号</option>
              <option value="clientName">客户名称</option>
            </select>
          </label>
        </div>
      </div>
      <div id="quote-message" class="message-box hidden"></div>
      <div id="quote-list" class="stack quote-list-stack"></div>
    </section>
  </div>
  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script src="/standard-quotes.js"></script>
  <script src="/app-shell.js"></script>
</body>
</html>
