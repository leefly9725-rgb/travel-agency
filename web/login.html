<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LDS International Travel | Operations Desk Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fy-bg: #f6f0e5;
      --fy-bg-soft: #fffaf2;
      --fy-panel: rgba(255, 252, 247, 0.94);
      --fy-line: rgba(20, 32, 51, 0.1);
      --fy-ink: #142033;
      --fy-muted: #667180;
      --fy-navy: #102346;
      --fy-navy-strong: #0d1f3d;
      --fy-gold: #c7a056;
      --fy-gold-soft: rgba(199, 160, 86, 0.16);
      --fy-focus: rgba(16, 35, 70, 0.14);
      --fy-error-bg: #fff4f1;
      --fy-error-line: #f1c6be;
      --fy-error-text: #a14a39;
      --fy-shadow: 0 28px 54px rgba(20, 32, 51, 0.12);
      --fy-radius-xl: 32px;
      --fy-radius-lg: 20px;
      --fy-radius-md: 14px;
    }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--fy-ink);
      background:
        radial-gradient(circle at top left, rgba(199, 160, 86, 0.18), transparent 24%),
        radial-gradient(circle at right center, rgba(16, 35, 70, 0.1), transparent 26%),
        linear-gradient(180deg, #fbf7f0 0%, #f3ece1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }
    .fy-login-shell {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 420px);
      gap: 22px;
      align-items: stretch;
    }
    .fy-login-brand,
    .fy-login-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--fy-radius-xl);
      border: 1px solid var(--fy-line);
      background: var(--fy-panel);
      box-shadow: var(--fy-shadow);
      backdrop-filter: blur(16px);
    }
    .fy-login-brand {
      padding: 38px 36px 34px;
      background:
        radial-gradient(circle at top right, rgba(199, 160, 86, 0.2), transparent 22%),
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(247,240,229,0.96));
      display: grid;
      grid-template-rows: auto auto;
      align-content: start;
      gap: 34px;
      min-height: 620px;
    }
    .fy-login-brand::after {
      content: "";
      position: absolute;
      right: 26px;
      bottom: 24px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 35, 70, 0.08), transparent 68%);
      pointer-events: none;
    }
    .fy-login-brand-top { position: relative; z-index: 1; display: grid; gap: 22px; }
    .fy-login-brand-row { display: flex; align-items: center; gap: 18px; min-width: 0; }
    .fy-login-mark {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 19px;
      background: linear-gradient(135deg, var(--fy-navy-strong), #1b3b69);
      box-shadow: 0 20px 32px rgba(16, 35, 70, 0.22);
      margin-bottom: 0;
      flex-shrink: 0;
    }
    .fy-login-mark img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: block;
    }
    .fy-login-kicker {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      max-width: 380px;
      color: var(--fy-navy);
      font-size: clamp(26px, 2.6vw, 29px);
      font-weight: 750;
      letter-spacing: -0.02em;
      line-height: 1.08;
    }
    .fy-login-brand h1 {
      font-size: clamp(42px, 4.8vw, 50px);
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: var(--fy-navy);
      margin-bottom: 0;
      max-width: 560px;
      font-weight: 800;
    }
    .fy-login-brand p {
      max-width: 560px;
      color: var(--fy-muted);
      font-size: 15.5px;
      line-height: 1.8;
    }
    .fy-login-brand-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 0;
      margin-top: 0;
      padding: 18px 0 0;
      border-top: 1px solid rgba(20, 32, 51, 0.08);
    }
    .fy-login-brand-item {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      padding: 18px 0;
      border-top: 1px solid rgba(20, 32, 51, 0.08);
    }
    .fy-login-brand-item:first-child { border-top: none; }
    .fy-login-brand-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      color: #8f6517;
      background: rgba(199, 160, 86, 0.18);
      border: 1px solid rgba(199, 160, 86, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }
    .fy-login-brand-item strong {
      display: block;
      font-size: 15px;
      color: var(--fy-navy);
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .fy-login-brand-item span {
      display: block;
      font-size: 13px;
      color: var(--fy-muted);
      line-height: 1.75;
    }
    .fy-login-card {
      padding: 32px 30px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .fy-login-card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--fy-navy) 0%, var(--fy-gold) 100%);
    }
    .fy-login-card-head {
      margin-bottom: 28px;
    }
    .fy-login-card-head h2 {
      font-size: 28px;
      line-height: 1.15;
      color: var(--fy-navy);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .fy-login-card-head p {
      color: var(--fy-muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .fy-login-form { display: grid; gap: 18px; }
    .fy-field { display: grid; gap: 8px; }
    .fy-field label {
      font-size: 13px;
      font-weight: 700;
      color: #435168;
    }
    .fy-field input {
      width: 100%;
      height: 52px;
      padding: 0 15px;
      border: 1px solid rgba(20, 32, 51, 0.12);
      border-radius: var(--fy-radius-md);
      background: rgba(255,255,255,0.9);
      color: var(--fy-ink);
      font-size: 15px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .fy-field input::placeholder { color: #9aa3af; }
    .fy-field input:focus {
      border-color: rgba(16, 35, 70, 0.28);
      box-shadow: 0 0 0 4px var(--fy-focus);
      background: #fff;
    }
    .fy-password-wrap { position: relative; }
    .fy-password-wrap input { padding-right: 48px; }
    .fy-toggle {
      position: absolute;
      inset: 0 0 0 auto;
      width: 48px;
      border: none;
      background: transparent;
      color: #6f7a88;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 0 var(--fy-radius-md) var(--fy-radius-md) 0;
    }
    .fy-toggle:hover { color: var(--fy-navy); }
    .fy-error {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--fy-error-line);
      background: var(--fy-error-bg);
      color: var(--fy-error-text);
      font-size: 13px;
      line-height: 1.7;
    }
    .fy-error.visible { display: block; }
    .fy-login-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--fy-navy-strong), #1e4678);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 18px 28px rgba(16, 35, 70, 0.2);
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    }
    .fy-login-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 22px 30px rgba(16, 35, 70, 0.24);
    }
    .fy-login-btn:disabled {
      opacity: 0.68;
      cursor: not-allowed;
      transform: none;
    }
    .fy-remember {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .fy-remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--fy-navy);
      cursor: pointer;
      flex-shrink: 0;
      margin: 0;
    }
    .fy-remember label {
      font-size: 13px;
      color: var(--fy-muted);
      cursor: pointer;
      user-select: none;
    }
    .fy-login-note {
      margin-top: 14px;
      color: #7a8490;
      font-size: 12px;
      line-height: 1.8;
      text-align: center;
    }
    @media (max-width: 960px) {
      .fy-login-shell { grid-template-columns: 1fr; }
      .fy-login-brand { min-height: auto; }
    }
    @media (max-width: 680px) {
      .fy-login-brand { gap: 28px; }
      .fy-login-brand-row { gap: 14px; }
      .fy-login-kicker { font-size: 23px; max-width: 300px; }
      .fy-login-brand h1 { max-width: none; }
      .fy-login-brand-list { padding-top: 16px; }
    }
    @media (max-width: 520px) {
      body { padding: 18px 12px; }
      .fy-login-brand,
      .fy-login-card { padding: 24px 20px; border-radius: 24px; }
      .fy-login-brand-top { gap: 14px; }
      .fy-login-brand-row { gap: 12px; }
      .fy-login-mark { width: 52px; height: 52px; border-radius: 16px; }
      .fy-login-mark img { width: 30px; height: 30px; }
      .fy-login-kicker { font-size: 20px; max-width: 240px; }
      .fy-login-brand h1 { font-size: 38px; }
      .fy-login-brand p { font-size: 14px; }
      .fy-login-brand-item { grid-template-columns: 30px minmax(0, 1fr); gap: 12px; padding: 16px 0; }
      .fy-login-brand-item strong { font-size: 14px; }
      .fy-login-brand-item span { font-size: 12.5px; }
      .fy-login-card-head h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="fy-login-shell">
    <section class="fy-login-brand" aria-label="&#21697;&#29260;&#20449;&#24687;">
      <div class="fy-login-brand-top">
        <div class="fy-login-brand-row">
          <div class="fy-login-mark">
            <img src="/assets/logo.png" alt="LDS International Travel" />
          </div>
          <span class="fy-login-kicker">LDS International Travel</span>
        </div>
        <h1>&#39640;&#31471;&#21830;&#21153;&#26053;&#34892;&#36816;&#33829;&#31995;&#32479;</h1>
        <p>&#29992;&#26356;&#20811;&#21046;&#12289;&#26356;&#28165;&#26224;&#30340;&#26041;&#24335;&#31649;&#29702;&#25253;&#20215;&#12289;&#23457;&#25209;&#19982;&#25191;&#34892;&#36319;&#36827;&#12290;&#30331;&#24405;&#21518;&#21363;&#21487;&#36827;&#20837;&#26032;&#29256;&#36816;&#33829;&#31995;&#32479;&#24037;&#20316;&#21488;&#12290;</p>
      </div>
      <div class="fy-login-brand-list">
        <div class="fy-login-brand-item">
          <span class="fy-login-brand-index">1</span>
          <div>
            <strong>&#19994;&#21153;&#32447;&#32034;&#26356;&#28165;&#26224;</strong>
            <span>&#32858;&#28966;&#25253;&#20215;&#12289;&#23457;&#25209;&#19982;&#25191;&#34892;&#19977;&#26465;&#20027;&#32447;&#65292;&#36991;&#20813;&#36827;&#20837;&#31995;&#32479;&#21518;&#20449;&#24687;&#21457;&#25955;&#12290;</span>
          </div>
        </div>
        <div class="fy-login-brand-item">
          <span class="fy-login-brand-index">2</span>
          <div>
            <strong>&#21697;&#29260;&#19982;&#24037;&#20316;&#21488;&#32479;&#19968;</strong>
            <span>&#30331;&#24405;&#39029;&#19982;&#26032;&#39318;&#39029;&#20445;&#25345;&#21516;&#19968;&#22871;&#26262;&#30333;&#12289;&#28145;&#34013;&#12289;&#37329;&#33394;&#28857;&#32512;&#30340;&#21830;&#21153;&#35270;&#35273;&#35821;&#35328;&#12290;</span>
          </div>
        </div>
        <div class="fy-login-brand-item">
          <span class="fy-login-brand-index">3</span>
          <div>
            <strong>&#30331;&#24405;&#27969;&#31243;&#20445;&#25345;&#19981;&#21464;</strong>
            <span>&#26412;&#39029;&#21482;&#25910;&#21475;&#35270;&#35273;&#21697;&#29260;&#19982;&#25991;&#26696;&#23618;&#65292;Supabase &#39564;&#35777;&#19982; token &#23384;&#20648;&#36923;&#36753;&#20445;&#25345;&#20860;&#23481;&#12290;</span>
          </div>
        </div>
      </div>
    </section>

    <section class="fy-login-card" aria-label="&#30331;&#24405;&#34920;&#21333;">
      <div class="fy-login-card-head">
        <h2>&#31995;&#32479;&#30331;&#24405;</h2>
        <p>&#35831;&#20351;&#29992;&#24050;&#24320;&#36890;&#30340;&#24080;&#21495;&#30331;&#24405;&#65292;&#36827;&#20837;&#39640;&#31471;&#21830;&#21153;&#26053;&#34892;&#36816;&#33829;&#31995;&#32479;&#24037;&#20316;&#21488;&#12290;</p>
      </div>

      <form id="login-form" class="fy-login-form" novalidate>
        <div class="fy-field">
          <label for="account">用户名</label>
          <input id="account" type="text" name="username" autocomplete="username" placeholder="请输入用户名" required />
        </div>

        <div class="fy-field">
          <label for="password">&#23494;&#30721;</label>
          <div class="fy-password-wrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="&#35831;&#36755;&#20837;&#23494;&#30721;" required />
            <button type="button" class="fy-toggle" id="toggle-pw" aria-label="&#26174;&#31034;&#25110;&#38544;&#34255;&#23494;&#30721;">
              <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="fy-remember">
          <input type="checkbox" id="remember-me" />
          <label for="remember-me">保持登录（7 天内免登录）</label>
        </div>

        <div class="fy-error" id="error-box" role="alert"></div>

        <button type="submit" class="fy-login-btn" id="btn-login">&#30331;&#24405;</button>
      </form>

      <p class="fy-login-note">&#26412;&#39029;&#21482;&#32479;&#19968;&#21697;&#29260;&#19982;&#35270;&#35273;&#65292;&#30331;&#24405;&#39564;&#35777;&#27969;&#31243;&#20445;&#25345;&#29616;&#26377;&#23454;&#29616;&#12290;</p>
    </section>
  </div>

  <script>
    // ── AuthStore（登录页内联副本，保持与 auth-guard.js 中 window.AuthStore 逻辑一致）
    const AuthStore = (function () {
      const T  = 'app_token';
      const R  = 'app_refresh_token';
      const EX = 'app_token_expires';
      const UN = 'app_saved_username';
      const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
      return {
        getToken() {
          const s = sessionStorage.getItem(T);
          if (s) return s;
          const l = localStorage.getItem(T);
          if (!l) return null;
          const exp = localStorage.getItem(EX);
          if (exp && Date.now() > parseInt(exp, 10)) { this.clearSession(); return null; }
          return l;
        },
        setSession(token, refreshToken, rememberMe) {
          this.clearSession();
          if (rememberMe) {
            localStorage.setItem(T, token);
            if (refreshToken) localStorage.setItem(R, refreshToken);
            localStorage.setItem(EX, String(Date.now() + SEVEN_DAYS));
          } else {
            sessionStorage.setItem(T, token);
            if (refreshToken) sessionStorage.setItem(R, refreshToken);
          }
        },
        clearSession() {
          localStorage.removeItem(T); localStorage.removeItem(R); localStorage.removeItem(EX);
          sessionStorage.removeItem(T); sessionStorage.removeItem(R);
        },
        getSavedUsername() { return localStorage.getItem(UN) || ''; },
        setSavedUsername(u) {
          u ? localStorage.setItem(UN, u) : localStorage.removeItem(UN);
        },
      };
    })();

    // ── 已登录则直接跳转首页
    if (AuthStore.getToken()) {
      window.location.replace('/index.html');
    }

    // ── 预填已保存的用户名
    (function prefillUsername() {
      const saved = AuthStore.getSavedUsername();
      if (saved) {
        document.getElementById('account').value = saved;
        document.getElementById('remember-me').checked = true;
      }
    })();

    // ── 密码显示切换
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const input = document.getElementById('password');
      const iconOn = document.getElementById('icon-eye');
      const iconOff = document.getElementById('icon-eye-off');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      iconOn.style.display = isHidden ? 'none' : '';
      iconOff.style.display = isHidden ? '' : 'none';
    });

    // ── 表单提交
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();

      const btn = document.getElementById('btn-login');
      const errorBox = document.getElementById('error-box');
      const username = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember-me').checked;

      errorBox.textContent = '';
      errorBox.classList.remove('visible');

      if (!username || !password) {
        errorBox.textContent = '请填写用户名和密码。';
        errorBox.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          let msg;
          if (res.status === 401) msg = '用户名或密码错误。';
          else if (res.status === 403) msg = '账号已被停用，请联系管理员。';
          else if (res.status === 429) msg = '登录失败次数过多，请15分钟后再试。';
          else msg = data.error || '登录失败，请稍后重试。';
          throw new Error(msg);
        }

        if (!data.access_token) {
          throw new Error('登录响应异常，请稍后重试。');
        }

        // 根据"保持登录"选项，决定存入 localStorage 还是 sessionStorage
        AuthStore.setSession(data.access_token, data.refresh_token || null, rememberMe);

        // 记住/清除用户名（不保存密码）
        AuthStore.setSavedUsername(rememberMe ? username : '');

        let initialized = true;
        try {
          const status = await fetch('/api/admin/bootstrap-status').then((r) => r.json());
          initialized = status.initialized !== false;
        } catch (_) {
          initialized = true;
        }

        window.location.href = initialized
          ? '/index.html'
          : '/error.html?reason=not_initialized';
      } catch (error) {
        errorBox.textContent = error.message || '登录失败，请稍后重试。';
        errorBox.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
