<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 泷鼎晟国际旅行社运营系统</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:        #1a3a5c;
      --brand-hover:  #15304e;
      --brand-focus:  rgba(26, 58, 92, 0.25);
      --bg-page:      #f0f4f8;
      --bg-card:      #ffffff;
      --text-primary: #1e2430;
      --text-muted:   #5f6b7a;
      --border:       #d4dbe3;
      --error-bg:     #fff1ef;
      --error-text:   #a33d2f;
      --error-border: #f5c6c1;
      --radius:       12px;
      --shadow:       0 8px 32px rgba(26, 58, 92, 0.12), 0 2px 8px rgba(26, 58, 92, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:      #0f1923;
        --bg-card:      #1a2535;
        --text-primary: #e8edf3;
        --text-muted:   #8a97a6;
        --border:       #2c3a4a;
        --error-bg:     #2a1a18;
        --error-text:   #f08070;
        --error-border: #5a2e28;
        --shadow:       0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
      }
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ─────────────────────────────────────────────────────── */
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 400px;
    }

    @media (max-width: 440px) {
      .login-card { padding: 32px 20px 28px; }
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .login-header { text-align: center; margin-bottom: 32px; }

    .login-brand {
      font-size: 18px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    @media (prefers-color-scheme: dark) {
      .login-brand { color: #5b9bd5; }
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Form fields ──────────────────────────────────────────────── */
    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .field input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-focus);
    }

    @media (prefers-color-scheme: dark) {
      .field input:focus { box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.25); }
    }

    /* ── Password wrapper ─────────────────────────────────────────── */
    .password-wrapper { position: relative; }

    .password-wrapper input { padding-right: 44px; }

    .toggle-password {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: 0 8px 8px 0;
      transition: color 0.15s;
    }

    .toggle-password:hover { color: var(--brand); }

    @media (prefers-color-scheme: dark) {
      .toggle-password:hover { color: #5b9bd5; }
    }

    /* ── Error ────────────────────────────────────────────────────── */
    .error-box {
      display: none;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .error-box.visible { display: block; }

    /* ── Submit button ────────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: var(--brand);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-login:hover:not(:disabled) { background: var(--brand-hover); }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-brand">泷鼎晟国际旅行社运营系统</div>
      <div class="login-subtitle">管理后台</div>
    </div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="account">账号</label>
        <input
          id="account"
          type="email"
          autocomplete="username"
          placeholder="请输入账号"
          required
        />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <div class="password-wrapper">
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            placeholder="请输入密码"
            required
          />
          <button type="button" class="toggle-password" id="toggle-pw" aria-label="显示/隐藏密码">
            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-box" id="error-box" role="alert"></div>

      <button type="submit" class="btn-login" id="btn-login">登录</button>
    </form>
  </div>

  <script>
    // ── Supabase config（由服务端注入，或部署时替换占位符）──────────
    const SUPABASE_URL      = window.__ENV__?.SUPABASE_URL      || '';
    const SUPABASE_ANON_KEY = window.__ENV__?.SUPABASE_ANON_KEY || '';

    // ── Toggle password visibility ──────────────────────────────────
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const input   = document.getElementById('password');
      const iconOn  = document.getElementById('icon-eye');
      const iconOff = document.getElementById('icon-eye-off');
      const isHidden = input.type === 'password';
      input.type        = isHidden ? 'text' : 'password';
      iconOn.style.display  = isHidden ? 'none'  : '';
      iconOff.style.display = isHidden ? ''      : 'none';
    });

    // ── Login form submit ───────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn      = document.getElementById('btn-login');
      const errorBox = document.getElementById('error-box');
      const account  = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;

      // Clear previous error
      errorBox.textContent = '';
      errorBox.classList.remove('visible');

      // Basic client-side check
      if (!account || !password) {
        errorBox.textContent = '请填写账号和密码。';
        errorBox.classList.add('visible');
        return;
      }

      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        errorBox.textContent = '系统配置异常，请联系管理员。';
        errorBox.classList.add('visible');
        return;
      }

      // Loading state
      btn.disabled    = true;
      btn.textContent = '登录中...';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ email: account, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          // 不区分"账号不存在"与"密码错误"，统一提示
          throw new Error('账号或密码错误。');
        }

        if (!data.access_token) {
          throw new Error('登录响应异常，请稍后重试。');
        }

        localStorage.setItem('app_token', data.access_token);

        // 检查系统是否已初始化（存在至少一个 admin 用户）
        let initialized = true;
        try {
          const status = await fetch('/api/admin/bootstrap-status').then(r => r.json());
          initialized = status.initialized !== false;
        } catch (_) { /* 网络异常时默认放行，避免阻断登录 */ }

        window.location.href = initialized
          ? '/index.html'
          : '/error.html?reason=not_initialized';

      } catch (err) {
        errorBox.textContent = err.message || '登录失败，请稍后重试。';
        errorBox.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
