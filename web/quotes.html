<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报价管理</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="topbar-link" href="/">← 首页</a>
      <div class="topbar-actions">
        <a class="button-link" href="/quote-new.html">新建标准报价</a>
        <a class="button-link" href="/quote-new.html?mode=project_based">新建项目型报价</a>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h1>标准报价列表</h1>
          <span>差旅接待报价，支持查看、编辑与删除操作</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <label for="quote-sort-select" style="font-size:13px;color:var(--text-secondary,#666);white-space:nowrap">排序：</label>
          <select id="quote-sort-select" style="font-size:13px;height:30px;border:1px solid var(--line,#e0e0e0);border-radius:6px;padding:2px 8px;background:var(--bg,#fff)">
            <option value="updated_at">最近更新</option>
            <option value="created_at">最新创建</option>
            <option value="quoteNumber">报价编号</option>
            <option value="clientName">客户名称</option>
          </select>
        </div>
      </div>
      <div id="quote-message" class="message-box hidden"></div>
      <div id="quote-list" class="stack"></div>
    </section>

    <section class="panel section-spacing">
      <div class="panel-head">
        <h1>项目型报价列表</h1>
        <span>大型活动、会议、展会报价，支持查看、编辑与删除操作</span>
      </div>
      <div id="project-quote-message" class="message-box hidden"></div>
      <div id="project-quote-list" class="stack"></div>
    </section>
  </div>
  <script src="/ui-labels.js"></script>
  <script src="/app-utils.js"></script>
  <script src="/quotes.js"></script>
</body>
</html>
